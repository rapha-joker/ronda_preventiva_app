<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Preventivas YDUQS</title>
<style>
:root{--navy:#081f5c;--navy2:#12327d;--cyan:#4db7cc;--bg:#f4f7fb;--card:#fff;--line:#dce5f0;--text:#16263f;--muted:#66758b;--success:#129c56;--danger:#cf3b2f;--shadow:0 12px 34px rgba(8,31,92,.10);--r-xl:24px;--r-lg:18px;--r-md:14px}
*{box-sizing:border-box} body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(180deg,#f7f9fc 0%,#eef3f9 100%);color:var(--text)}
.app{max-width:1240px;margin:0 auto;padding:18px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:18px}.brand{display:flex;align-items:center;gap:14px}.brand-logo{background:#fff;border:1px solid var(--line);border-radius:16px;padding:8px 12px;box-shadow:var(--shadow);min-width:120px;display:grid;place-items:center;color:var(--navy);font-weight:800}.brand h1{margin:0;color:var(--navy)}.brand p{margin:4px 0 0;color:var(--muted)}
.layout{display:grid;grid-template-columns:290px 1fr;gap:18px}.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r-xl);box-shadow:var(--shadow)}.sidebar{padding:20px}.main{padding:22px;min-height:680px}.section-title{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}.section-title h2,.section-title h3{margin:0;color:var(--navy)}.muted{color:var(--muted)}.pill{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:8px 12px;background:#eef7fa;border:1px solid #d4ebf1;color:#0b6474;font-size:.9rem;font-weight:700}
.card,.question,.report-box{border:1px solid var(--line);border-radius:20px;padding:18px;background:#fff;margin-bottom:16px}.grid{display:grid;gap:14px}.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}.field{display:grid;gap:8px}label,.legend{font-weight:700;font-size:.96rem}input[type=text],textarea,select{width:100%;border:1px solid var(--line);border-radius:14px;padding:13px 14px;font:inherit;color:var(--text);background:#fff;outline:none}input[type=text]:focus,textarea:focus,select:focus{border-color:#8cb6ff;box-shadow:0 0 0 4px rgba(80,132,255,.12)}textarea{min-height:96px;resize:vertical}
button{border:none;border-radius:14px;padding:12px 16px;font:inherit;font-weight:700;cursor:pointer;transition:.15s ease}button:hover{transform:translateY(-1px)}.btn-primary{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff}.btn-secondary{background:#fff;border:1px solid var(--line);color:var(--text)}.btn-danger{background:#fff1ef;border:1px solid #ffd5d0;color:var(--danger)}
.actions{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:20px}.type-card{border:1px solid var(--line);border-radius:18px;padding:16px;background:#fbfdff;cursor:pointer;transition:.2s ease;text-align:left}.type-card.selected,.type-card:hover{background:#eef4ff;border-color:#b5cbff}.type-card strong{display:block;margin-bottom:8px;color:var(--navy)}
.step{border:1px solid var(--line);border-radius:var(--r-lg);padding:14px;display:flex;gap:12px;margin-bottom:12px;background:#fbfdff}.step.active{background:#eef4ff;border-color:#b5cbff}.step.done{background:#effbf3;border-color:#bfe7cd}.step-badge{min-width:34px;height:34px;border-radius:12px;display:grid;place-items:center;background:var(--navy);color:#fff;font-weight:800}.step.done .step-badge{background:var(--success)}.question-head{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}.q-num{min-width:34px;height:34px;border-radius:12px;display:grid;place-items:center;background:var(--navy);color:#fff;font-weight:800}
.choice-group{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}.choice{position:relative;flex:1 1 150px}.choice input{position:absolute;opacity:0;pointer-events:none}.choice label{display:block;text-align:center;border:1px solid var(--line);border-radius:14px;padding:12px 14px;background:#fff;min-height:48px;cursor:pointer}.choice input:checked+label{background:#eef4ff;border-color:#a9c4ff;box-shadow:0 0 0 4px rgba(80,132,255,.10)}
.info-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:12px}.info-grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}.info-box{border:1px solid var(--line);background:#fbfdff;border-radius:14px;padding:12px}.info-box strong{display:block;color:var(--navy);margin-bottom:6px;font-size:.92rem}.round-note{padding:12px 14px;border-radius:14px;background:#fff8e8;border:1px solid #f0db9c;color:#775b00;margin-top:12px}
.summary-list{display:grid;gap:12px}.summary-item{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff}
.hidden{display:none!important}.field-error{border:2px solid #cf3b2f!important;box-shadow:0 0 0 3px rgba(207,59,47,.12)!important}
@media (max-width:920px){.app{padding:12px}.layout{grid-template-columns:1fr}.sidebar,.main{padding:14px}.grid-2,.grid-3,.info-grid,.info-grid.cols-4{grid-template-columns:1fr}.actions{flex-direction:column}.actions>*{width:100%}.choice{flex:1 1 100%}}
.btn-soft{background:#eef7fa;border:1px solid #d4ebf1;color:#0b6474}

.report-shell{position:relative;overflow:hidden;background:linear-gradient(135deg,#ffffff 0%,#f4f8fd 100%);border:1px solid #d7e3f3;border-radius:24px;box-shadow:var(--shadow)}

const LOCAL_TECHNICIANS = ['Raphael Amaral'];
const SHAREPOINT_CONFIG = {
  enabled: false,
  siteUrl: 'https://SEU-TENANT.sharepoint.com/sites/SEU-SITE',
  lists: {
    technicians: 'TecnicosRonda',
    regionals: 'RegionaisRonda',
    units: 'UnidadesRonda'
  }
};

let techniciansData = [...LOCAL_TECHNICIANS];
let regionalsData = Object.keys(REGIONAL_UNITS);
let unitsByRegionalData = JSON.parse(JSON.stringify(REGIONAL_UNITS));
let sharepointStatus = { mode: 'local', message: 'Usando listas locais fixas do HTML.' };

function normalizeText(value){ return String(value ?? '').trim(); }
function dedupeAndSort(arr){ return Array.from(new Set((arr || []).map(normalizeText).filter(Boolean))).sort((a,b)=>a.localeCompare(b,'pt-BR',{sensitivity:'base'})); }
function getRequestDigest(){
  const digestInput = document.getElementById('__REQUESTDIGEST');
  if (digestInput && digestInput.value) return digestInput.value;
  if (window._spPageContextInfo && window._spPageContextInfo.formDigestValue) return window._spPageContextInfo.formDigestValue;
  return '';
}
async function fetchSharePointJson(url){
  const response = await fetch(url, {
    method: 'GET',
    headers: { 'Accept': 'application/json;odata=verbose' },
    credentials: 'include'
  });
  if (!response.ok) throw new Error(`Falha ao consultar SharePoint (${response.status})`);
  return response.json();
}
async function loadDropdownDataFromSharePoint(){
  const base = SHAREPOINT_CONFIG.siteUrl.replace(/\/$/, '');
  const techUrl = `${base}/_api/web/lists/getbytitle('${encodeURIComponent(SHAREPOINT_CONFIG.lists.technicians)}')/items?$select=Id,Title,Ativo,Ordem&$filter=Ativo eq 1&$orderby=Ordem,Title`;
  const regionalUrl = `${base}/_api/web/lists/getbytitle('${encodeURIComponent(SHAREPOINT_CONFIG.lists.regionals)}')/items?$select=Id,Title,Ativo,Ordem&$filter=Ativo eq 1&$orderby=Ordem,Title`;
  const unitUrl = `${base}/_api/web/lists/getbytitle('${encodeURIComponent(SHAREPOINT_CONFIG.lists.units)}')/items?$select=Id,Title,Ativo,Ordem,Regional/Id,Regional/Title&$expand=Regional&$filter=Ativo eq 1&$orderby=Ordem,Title`;

  const [techData, regionalData, unitData] = await Promise.all([
    fetchSharePointJson(techUrl),
    fetchSharePointJson(regionalUrl),
    fetchSharePointJson(unitUrl)
  ]);

  techniciansData = dedupeAndSort((techData.d?.results || []).map(item => item.Title));
  regionalsData = dedupeAndSort((regionalData.d?.results || []).map(item => item.Title));

  const grouped = {};
  (unitData.d?.results || []).forEach(item => {
    const regionalName = normalizeText(item?.Regional?.Title);
    const unitName = normalizeText(item?.Title);
    if (!regionalName || !unitName) return;
    if (!grouped[regionalName]) grouped[regionalName] = [];
    grouped[regionalName].push(unitName);
  });
  Object.keys(grouped).forEach(key => grouped[key] = dedupeAndSort(grouped[key]));
  unitsByRegionalData = grouped;
  sharepointStatus = { mode: 'sharepoint', message: 'Dados carregados do SharePoint com sucesso.' };
}

async function initializeDropdownData(){
  if (!SHAREPOINT_CONFIG.enabled) {
    techniciansData = [...LOCAL_TECHNICIANS];
    regionalsData = Object.keys(REGIONAL_UNITS);
    unitsByRegionalData = JSON.parse(JSON.stringify(REGIONAL_UNITS));
    sharepointStatus = { mode: 'local', message: 'Usando listas locais fixas do HTML. Para usar SharePoint, ajuste SHAREPOINT_CONFIG.enabled para true.' };
    return;
  }
  try {
    await loadDropdownDataFromSharePoint();
  } catch (error) {
    console.error(error);
    techniciansData = [...LOCAL_TECHNICIANS];
    regionalsData = Object.keys(REGIONAL_UNITS);
    unitsByRegionalData = JSON.parse(JSON.stringify(REGIONAL_UNITS));
    sharepointStatus = { mode: 'fallback', message: `Não foi possível consultar o SharePoint. O app voltou para a lista local. Detalhe: ${error.message}` };
  }
}

function buildRounds(){
  const rounds = [
    {id:'datacenter', name:'Data Center', description:'Verificação do ambiente, ativos e organização do Data Center.'},
    {id:'setores', name:'Setores Administrativos', description:'Avaliação dos ambientes administrativos e problemas recorrentes.'},
    {id:'wifi', name:'Infraestrutura de Wifi', description:'Checklist de Access Points, visibilidade de redes, acesso e roaming.'},
    {id:'racks', name:'Racks de Distribuição', description:'Inspeção dos racks de distribuição e organização física.'},
    {id:'salas_tecnicas', name:'Salas Técnicas', description:'Verificação das salas técnicas e infraestrutura associada.'},
    {id:'salas_estoque', name:'Salas de Estoque', description:'Verificação física e organizacional das salas de estoque.'},
    {id:'salas_reuniao_modelo1', name:'Salas de Reunião', description:'Verificação das salas de reunião e infraestrutura associada.', onlyIf: s => s.regional === 'Corporativo'},
    {id:'salas_reuniao_modelo2', name:'Salas de Reunião', description:'Verificação das salas de reunião e infraestrutura associada.', onlyIf: s => s.regional && s.regional !== 'Corporativo'},
    {id:'auditorio', name:'Auditório', description:'Verificação do auditório e seus recursos.', onlyIf: s => s.regional && s.regional !== 'Corporativo'},
    {id:'sala_ao_vivo', name:(state.regional==='Corporativo' && state.unidade==='Città Office') ? 'Sala ao Vivo' : 'Sala de Aula / Sala de Aula ao Vivo', description:(state.regional==='Corporativo' && state.unidade==='Città Office') ? 'Verificação da Sala ao Vivo.' : 'Verificação Sala ao Vivo.', onlyIf: s => s.regional !== 'Corporativo' || s.unidade === 'Città Office'}
  ];
  return rounds.filter(r => !r.onlyIf || r.onlyIf(state));
}

async function init(){ await initializeDropdownData(); renderSteps(); renderScreen1(); renderScreen2(); renderScreen3(); renderScreen4(); showStep(1); }
function renderSteps(){ stepsEl.innerHTML = steps.map(step => `<div class="${currentStep===step.id?'step active':currentStep>step.id?'step done':'step'}"><div class="step-badge">${currentStep>step.id?'✓':step.id}</div><div><div style="font-weight:800;color:var(--navy)">${step.title}</div><div class="muted" style="font-size:.92rem">${step.desc}</div></div></div>`).join(''); }
function showStep(step){ currentStep = step; [screen1,screen2,screen3,screen4].forEach((el,idx)=>el.classList.toggle('hidden', idx+1!==step)); renderSteps(); if(step===2) renderScreen2(); if(step===3) renderScreen3(); if(step===4) renderScreen4(); window.scrollTo({top:0,behavior:'smooth'}); }
function escapeHtml(v){ return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
function slugify(t){ return String(t||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]+/g,'_').replace(/^_|_$/g,'').toLowerCase(); }

function getSelectedRound(){ return buildRounds().find(r=>r.id===state.roundId) || null; }

function getQuestionsForRound(roundId){
  if(roundId==='wifi') return WIFI_QUESTIONS;
  if(roundId==='datacenter') return DATACENTER_QUESTIONS;
  if(roundId==='salas_reuniao_modelo1' || roundId==='salas_reuniao_modelo2') return state.regional==='Corporativo' ? SALAS_REUNIAO_CORPORATIVO_QUESTIONS : SALAS_REUNIAO_NAO_CORPORATIVO_QUESTIONS;
  if(roundId==='racks') return RACKS_QUESTIONS;
  if(roundId==='salas_estoque') return state.regional==='Corporativo' ? SALAS_ESTOQUE_CORPORATIVO_QUESTIONS : SALAS_ESTOQUE_NAO_CORPORATIVO_QUESTIONS;
  if(roundId==='salas_tecnicas') return state.regional==='Corporativo' ? SALAS_TECNICAS_CORPORATIVO_QUESTIONS : SALAS_TECNICAS_NAO_CORPORATIVO_QUESTIONS;
  if(roundId==='sala_ao_vivo') return (state.regional==='Corporativo' && state.unidade==='Città Office') ? SALA_AO_VIVO_CITTA_QUESTIONS : SALA_AO_VIVO_QUESTIONS;
  if(roundId==='setores') return state.regional==='Corporativo' ? SETORES_CORPORATIVO_QUESTIONS : SETORES_NAO_CORPORATIVO_QUESTIONS;
  if(roundId==='auditorio') return AUDITORIO_QUESTIONS;
  const shared = [
    {id:'andar', kind:'text', text:'Andar', placeholder:'Ex.: 3º andar'},
    {id:'tempo', kind:'text', text:'Tempo total de ronda (min)', placeholder:'Ex.: 25'},
    {id:'obs', kind:'textarea', text:'Observações', placeholder:'Descreva observações adicionais'}
  ];
  const presets = {
    datacenter:[...shared,{id:'dc_1',kind:'status',text:'Ambiente organizado e sem obstruções?'},{id:'dc_2',kind:'status',text:'Equipamentos energizados e sem alertas visíveis?'}],
    setores:[...shared,{id:'set_1',kind:'status',text:'Ambiente sem incidentes aparentes de TI?'},{id:'set_2',kind:'status',text:'Impressoras e estações em condição adequada?'}],
    racks:[...shared,{id:'rack_1',kind:'status',text:'Rack identificado e organizado?'},{id:'rack_2',kind:'status',text:'Cabos sem risco aparente e bem acomodados?'}],
    salas_tecnicas:[...shared,{id:'st_1',kind:'status',text:'Sala técnica limpa e organizada?'},{id:'st_2',kind:'status',text:'Equipamentos e conectividade sem anomalias visíveis?'}],
    salas_estoque:[...shared,{id:'se_1',kind:'status',text:'Itens armazenados de forma adequada?'},{id:'se_2',kind:'status',text:'Ambiente limpo e identificado?'}],
    auditorio:[...shared,{id:'au_1',kind:'status',text:'Áudio e vídeo operantes?'},{id:'au_2',kind:'status',text:'Cabos e periféricos organizados?'}],
    sala_ao_vivo:[...shared,{id:'sv_1',kind:'status',text:'Equipamentos audiovisuais operantes?'},{id:'sv_2',kind:'status',text:'Conectividade e estrutura em conformidade?'}],
    salas_reuniao_modelo1:[...shared,{id:'sr1_1',kind:'status',text:'Equipamento de videoconferência liga e inicializa sem alertas?'},{id:'sr1_2',kind:'status',text:'TV/Monitor e periféricos em conformidade?'}],
    salas_reuniao_modelo2:[...shared,{id:'sr2_1',kind:'status',text:'Equipamento da sala opera corretamente?'},{id:'sr2_2',kind:'status',text:'Conectividade e compartilhamento funcionando?'}]
  };
  return presets[roundId] || shared;
}

function renderStatusChoices(name, current='', kind='status'){
  const opts = kind==='status2' ? ['Conforme','Não Conforme'] : ['Conforme','Não Conforme','Não se Aplica'];
  return `<div class="choice-group">${opts.map(opt=>`<div class="choice"><input type="radio" name="${name}" id="${name}_${slugify(opt)}" value="${opt}" ${current===opt?'checked':''}><label for="${name}_${slugify(opt)}">${opt}</label></div>`).join('')}</div>`;
}

function renderScreen3(){
  const round = getSelectedRound();
  if(!round){ screen3.innerHTML = `<div class="report-box">Selecione uma ronda na etapa anterior.</div>`; return; }
  const questions = getQuestionsForRound(round.id);
  screen3.innerHTML = `
    <div class="section-title"><div><h2>${escapeHtml(round.name)}</h2><div class="muted">${escapeHtml(round.description)}</div></div><span class="pill">${questions.length} item(ns)</span></div>

      <div class="field">
        <label for="setor">SETOR</label>
        <input id="setor" type="text" value="${escapeHtml(state.setor || '')}" placeholder="Insire o nome do setor, andar, sala e etc..">
      </div>
    </div>
    ${questions.map((q,idx)=>renderQuestion(q,idx)).join('')}
    <div class="actions"><button class="btn-secondary" id="back2" type="button">Voltar</button><button class="btn-primary" id="toStep4" type="button">Finalizar</button></div>`;

  document.getElementById('setor').addEventListener('input', e=>state.setor=e.target.value);

        if(obsWrap) obsWrap.classList.toggle('hidden', state.answers[q.id] !== 'Não Conforme');
      }));
      const obs = document.getElementById(`obs_${q.id}`);
      if(obs) obs.addEventListener('input', e=>state.answers[`obs_${q.id}`]=e.target.value);
    }
  });
  document.getElementById('back2').addEventListener('click', ()=>showStep(2));
  document.getElementById('toStep4').addEventListener('click', ()=>{
    if(!validateRound(questions)) return;
    showStep(4);
  });
}

function renderQuestion(q, idx){
  if(q.kind==='text'){
    return `<div class="question"><div class="question-head"><div class="q-num">${idx+1}</div><div style="width:100%"><div class="legend">${escapeHtml(q.text)}</div><div class="field" style="margin-top:10px"><input id="${q.id}" type="text" value="${escapeHtml(state.answers[q.id]||'')}" placeholder="${escapeHtml(q.placeholder||'')}"></div></div></div></div>`;
  }
  if(q.kind==='textarea'){
    return `<div class="question"><div class="question-head"><div class="q-num">${idx+1}</div><div style="width:100%"><div class="legend">${escapeHtml(q.text)}</div><div class="field" style="margin-top:10px"><textarea id="${q.id}" placeholder="${escapeHtml(q.placeholder||'')}">${escapeHtml(state.answers[q.id]||'')}</textarea></div></div></div></div>`;
  }
  const colsClass = q.cols===4 ? 'cols-4' : '';
  return `<div class="question">
    <div class="question-head"><div class="q-num">${idx+1}</div><div style="width:100%"><div class="legend">${escapeHtml(q.text)}</div></div></div>
    <div class="info-grid ${colsClass}">${q.infos.map(info=>`<div class="info-box"><strong>${escapeHtml(info[0])}</strong><div class="muted">${escapeHtml(info[1])}</div></div>`).join('')}</div>
    ${renderStatusChoices(q.id, state.answers[q.id]||'', q.kind)}
    <div id="obs_wrap_${q.id}" class="field ${state.answers[q.id]==='Não Conforme' ? '' : 'hidden'}" style="margin-top:12px">
      <label for="obs_${q.id}">Observação da não conformidade</label>
      <textarea id="obs_${q.id}" placeholder="Descreva o problema encontrado">${escapeHtml(state.answers[`obs_${q.id}`]||'')}</textarea>
    </div>
  </div>`;
}

function validateRound(questions){
  for(const q of questions){
    if(q.kind==='text' && !String(state.answers[q.id]||'').trim()){ alert(`Preencha o campo: ${q.text}`); return false; }
    if(q.kind!=='text' && q.kind!=='textarea' && !state.answers[q.id]){ alert(`Responda o item: ${q.text}`); return false; }
    if(state.answers[q.id]==='Não Conforme' && !String(state.answers[`obs_${q.id}`]||'').trim()){ alert(`Descreva a não conformidade do item: ${q.text}`); return false; }
  }
  return true;
}

function buildExportRows(){
  const round = getSelectedRound();
  const questions = round ? getQuestionsForRound(round.id) : [];
  return questions.map(q=>({
    Tecnico: state.tecnico || '',
    Regional: state.regional || '',
    Unidade: state.unidade || '',
    Setor: state.setor || '',
    Fieldtask: state.assinatura || '',
    Ambiente: round ? round.name : '',
    Pergunta: q.text,
    Resposta: state.answers[q.id] || '',
    Observacao: state.answers[`obs_${q.id}`] || ''
  }));
}

function getBaseFileName(){
  const round = getSelectedRound();
  const fieldtask = slugify(state.assinatura || 'sem_fieldtask');
  const regional = slugify(state.regional || 'sem_regional');
  const unidade = slugify(state.unidade || 'sem_unidade');
  const ronda = slugify(round ? round.name : 'sem_ronda');
  return `${fieldtask}_${regional}_${unidade}_${ronda}`;
}

function exportCSV(){
  const rows = buildExportRows();
  const headers = ['Tecnico','Regional','Unidade','Fieldtask','Ronda','Pergunta','Resposta','Observacao'];
  const csv = [headers.join(';')].concat(rows.map(row=>headers.map(h=>`"${String(row[h]||'').replace(/"/g,'""')}"`).join(';'))).join('\n');
  downloadBlob(new Blob([csv], {type:'text/csv;charset=utf-8;'}), `${getBaseFileName()}.csv`);
}

function exportExcel(){
  const rows = buildExportRows();
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb, ws, 'Ronda');
  XLSX.writeFile(wb, `${getBaseFileName()}.xlsx`);
}

function normalizePdfText(value){
  return String(value || '')
    .replace(/[\u2010\u2011\u2012\u2013\u2014\u2015]/g, '-')
    .replace(/[\u2018\u2019\u201A\u201B]/g, "'")
    .replace(/[\u201C\u201D\u201E\u201F]/g, '"')
    .replace(/…/g, '...')
    .replace(/•/g, '-')
    .replace(/✔️|✔/g, 'OK')
    .replace(/❌|✖|✕|×/g, 'X')
    .replace(/Ñ/g, 'N')
    .replace(/&nbsp;/gi, ' ')
    .normalize('NFKC');
}

function exportPDF(returnBlob=false){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'pt', format:'a4'});
  const pageW = doc.internal.pageSize.width;
  const pageH = doc.internal.pageSize.height;
  const margin = 42;
  const round = getSelectedRound();

  function obterDataChecklistFormatada(){
    let raw = state.dataRonda || '';
    if(!raw){
      const el = document.getElementById('dataRonda');
      if(el && el.value) raw = el.value;
    }
    if(raw && /^\d{4}-\d{2}-\d{2}$/.test(raw)){
      const [a,m,d] = raw.split('-');
      return `${d}-${m}-${a}`;
    }
    return '-';
  }

  function drawPageHeader(){
    doc.setFillColor(8,31,92);
    doc.rect(0,0,pageW,92,'F');
    doc.setFillColor(18,50,125);
    doc.rect(0,68,pageW,24,'F');
    try { doc.addImage(YDUQS_LOGO, 'PNG', pageW-178, 20, 138, 44, undefined, 'FAST'); } catch(e) {}
    doc.setTextColor(255,255,255);
    doc.setFont('helvetica','bold');
    doc.setFontSize(18);
    doc.text(normalizePdfText('Relatório de Ronda Preventiva'), margin, 36);
    doc.setFontSize(10);
    doc.setFont('helvetica','normal');
    doc.text(normalizePdfText(`Emitido em ${new Date().toLocaleString('pt-BR')}`), margin, 56);

    try {
      doc.saveGraphicsState();
      if (doc.setGState) { doc.setGState(new doc.GState({opacity:0.06})); }
      doc.addImage(YDUQS_LOGO, 'PNG', 70, 230, pageW-140, (pageW-140)*0.20, undefined, 'FAST');
      doc.restoreGraphicsState();
    } catch(e) {}

    doc.setTextColor(22,38,63);
  }

  function drawPageFooter(pageNumber){
    doc.setDrawColor(220,229,240);
    doc.line(margin, pageH-34, pageW-margin, pageH-34);
    doc.setFontSize(9);
    doc.setTextColor(102,117,139);
    doc.text(normalizePdfText('YDUQS - Relatório gerado pelo app de ronda preventiva'), margin, pageH-20);
    doc.text(`Página ${pageNumber}`, pageW-margin, pageH-20, {align:'right'});
    doc.setTextColor(22,38,63);
  }

  function ensurePageSpace(currentY, neededHeight){
    if(currentY + neededHeight > pageH - 54){
      drawPageFooter(page);
      doc.addPage();
      page += 1;
      drawPageHeader();
      return 118;
    }
    return currentY;
  }

  let page = 1;
  drawPageHeader();

  let y = 118;
  const meta = [
    ['Técnico', state.tecnico || '-'],
    ['Regional', state.regional || '-'],
    ['Unidade', state.unidade || '-'],
    ['Fieldtask', state.assinatura || '-'],
    ['Data do checklist', obterDataChecklistFormatada()],
    ['SETOR', state.setor || '-'],
    ['Ambiente', round ? round.name : '-'],
    ['Início', state.startedAt ? new Date(state.startedAt).toLocaleString('pt-BR') : '-']
  ];

  const colGap = 12;
  const colW = (pageW - margin*2 - colGap)/2;
  const rowGap = 12;

  for(let i = 0; i < meta.length; i += 2){
    const rowItems = meta.slice(i, i + 2);
    const rowHeight = Math.max(...rowItems.map(item => {
      const valueLines = doc.splitTextToSize(normalizePdfText(item[1]), colW - 24);
      return Math.max(64, 24 + (valueLines.length * 14) + 18);
    }));

    y = ensurePageSpace(y, rowHeight + rowGap);

    rowItems.forEach((item, idx) => {
      const x = margin + idx * (colW + colGap);
      const valueLines = doc.splitTextToSize(normalizePdfText(item[1]), colW - 24);

      doc.setFillColor(244,248,253);
      doc.roundedRect(x, y, colW, rowHeight, 8, 8, 'F');

      doc.setTextColor(8,31,92);
      doc.setFont('helvetica','bold');
      doc.setFontSize(10);
      doc.text(normalizePdfText(item[0]), x + 12, y + 18);

      doc.setTextColor(22,38,63);
      doc.setFont('helvetica','normal');
      doc.setFontSize(11);
      doc.text(valueLines, x + 12, y + 42);
    });

    y += rowHeight + rowGap;
  }

  y += 4;
  y = ensurePageSpace(y, 30);

  doc.setTextColor(8,31,92);
  doc.setFont('helvetica','bold');
  doc.setFontSize(13);
  doc.text(normalizePdfText('Respostas da ronda'), margin, y);
  y += 22;

  buildExportRows().forEach((row, idx)=>{
    const question = normalizePdfText(`${idx+1}. ${row.Pergunta}`);
    const answer = normalizePdfText(`Resposta: ${row.Resposta || '-'}`);
    const note = row.Observacao ? normalizePdfText(`Observação: ${row.Observacao}`) : '';

    const qLines = doc.splitTextToSize(question, pageW - margin*2 - 24);
    const aLines = doc.splitTextToSize(answer, pageW - margin*2 - 24);
    const nLines = note ? doc.splitTextToSize(note, pageW - margin*2 - 24) : [];

    const blockHeight = 24 + (qLines.length * 14) + (aLines.length * 14) + (nLines.length ? 10 + (nLines.length * 14) : 0) + 18;
    y = ensurePageSpace(y, blockHeight + 10);

    doc.setFillColor(255,255,255);
    doc.setDrawColor(220,229,240);
    doc.roundedRect(margin, y, pageW - margin*2, blockHeight, 10, 10, 'FD');

    let innerY = y + 20;

    doc.setTextColor(8,31,92);
    doc.setFont('helvetica','bold');
    doc.setFontSize(11);
    qLines.forEach(line=>{ doc.text(line, margin+12, innerY); innerY += 14; });

    doc.setTextColor(22,38,63);
    doc.setFont('helvetica','normal');
    aLines.forEach(line=>{ doc.text(line, margin+12, innerY); innerY += 14; });

    if(nLines.length){
      innerY += 4;
      doc.setTextColor(14,167,192);
      nLines.forEach(line=>{ doc.text(line, margin+12, innerY); innerY += 14; });
    }

    y += blockHeight + 10;
  });

  drawPageFooter(page);
  const fileName = `${getBaseFileName()}.pdf`;
  if(returnBlob){
    return { blob: doc.output('blob'), fileName };
  }
  doc.save(fileName);
  return { fileName };
}

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

function finalizeProcess(){
  exportPDF(false);
  setTimeout(()=>resetAll(), 500);
}

function resetAll(){
  if(!confirm('Deseja apagar todo o processo e voltar para a aba Identificação?')) return;
  state.tecnico=''; state.regional=''; state.unidade=''; state.assinatura=''; state.dataRonda=''; state.setor=''; state.roundId=''; state.answers={}; state.startedAt='';
  renderScreen1(); renderScreen2(); renderScreen3(); renderScreen4(); showStep(1);
}
</script>
