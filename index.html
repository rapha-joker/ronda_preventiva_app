<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#081f5c" />
  <title>Ronda Preventiva YDUQS</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --navy:#081f5c; --navy2:#12327d; --cyan:#4db7cc; --bg:#f4f7fb; --card:#fff;
      --line:#dce5f0; --text:#16263f; --muted:#66758b; --success:#129c56; --danger:#cf3b2f;
      --shadow:0 12px 34px rgba(8,31,92,.10); --r-xl:24px; --r-lg:18px; --r-md:14px;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,Arial,sans-serif; background:linear-gradient(180deg,#f7f9fc 0%,#eef3f9 100%); color:var(--text); }
    .app { max-width:1180px; margin:0 auto; padding:18px; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:18px; }
    .brand { display:flex; align-items:center; gap:14px; }
    .brand-logo { background:#fff; border:1px solid var(--line); border-radius:16px; padding:8px 12px; box-shadow:var(--shadow); min-width:120px; display:grid; place-items:center; color:var(--navy); font-weight:800; }
    .brand h1 { margin:0; font-size:clamp(1.2rem,2vw,1.9rem); color:var(--navy); }
    .brand p { margin:4px 0 0; color:var(--muted); }
    .toolbar { display:flex; gap:10px; flex-wrap:wrap; }
    .layout { display:grid; grid-template-columns:290px 1fr; gap:18px; }
    .panel { background:var(--card); border:1px solid var(--line); border-radius:var(--r-xl); box-shadow:var(--shadow); }
    .sidebar { padding:20px; }
    .main { padding:22px; min-height:680px; }
    .step { border:1px solid var(--line); border-radius:var(--r-lg); padding:14px; display:flex; gap:12px; margin-bottom:12px; background:#fbfdff; }
    .step.active { background:#eef4ff; border-color:#b5cbff; }
    .step.done { background:#effbf3; border-color:#bfe7cd; }
    .step-badge { min-width:34px; height:34px; border-radius:12px; display:grid; place-items:center; background:var(--navy); color:#fff; font-weight:800; }
    .step.done .step-badge { background:var(--success); }
    .section-title { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:14px; }
    .section-title h2,.section-title h3 { margin:0; color:var(--navy); }
    .muted { color:var(--muted); }
    .pill { display:inline-flex; align-items:center; gap:8px; border-radius:999px; padding:8px 12px; background:#eef7fa; border:1px solid #d4ebf1; color:#0b6474; font-size:.9rem; font-weight:700; }
    .card,.question,.report-box { border:1px solid var(--line); border-radius:20px; padding:18px; background:#fff; margin-bottom:16px; }
    .grid { display:grid; gap:14px; }
    .grid-2 { grid-template-columns:repeat(2,minmax(0,1fr)); }
    .field { display:grid; gap:8px; }
    label,.legend { font-weight:700; font-size:.96rem; }
    input[type="text"], textarea, select { width:100%; border:1px solid var(--line); border-radius:14px; padding:13px 14px; font:inherit; color:var(--text); background:#fff; outline:none; }
    input[type="text"]:focus, textarea:focus, select:focus { border-color:#8cb6ff; box-shadow:0 0 0 4px rgba(80,132,255,.12); }
    textarea { min-height:96px; resize:vertical; }
    input[type="file"] { width:100%; border:1px dashed var(--line); border-radius:14px; padding:10px; font:inherit; background:#fbfdff; }
    button { border:none; border-radius:14px; padding:12px 16px; font:inherit; font-weight:700; cursor:pointer; transition:.15s ease; }
    button:hover { transform:translateY(-1px); }
    .btn-primary { background:linear-gradient(135deg,var(--navy),var(--navy2)); color:#fff; }
    .btn-secondary { background:#fff; border:1px solid var(--line); color:var(--text); }
    .btn-soft { background:#eef7fa; border:1px solid #d4ebf1; color:#0b6474; }
    .btn-danger { background:#fff1ef; border:1px solid #ffd5d0; color:var(--danger); }
    .actions { display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-top:20px; }
    .type-card { border:1px solid var(--line); border-radius:18px; padding:16px; background:#fbfdff; cursor:pointer; transition:.2s ease; text-align:left; }
    .type-card.selected,.type-card:hover { background:#eef4ff; border-color:#b5cbff; }
    .type-card strong { display:block; margin-bottom:8px; color:var(--navy); }
    .question-head { display:flex; gap:12px; align-items:flex-start; margin-bottom:12px; }
    .q-num { min-width:34px; height:34px; border-radius:12px; display:grid; place-items:center; background:var(--navy); color:#fff; font-weight:800; }
    .choice-group { display:flex; gap:10px; flex-wrap:wrap; }
    .choice { position:relative; flex:1 1 120px; }
    .choice input { position:absolute; opacity:0; pointer-events:none; }
    .choice label { display:block; text-align:center; border:1px solid var(--line); border-radius:14px; padding:12px 14px; background:#fff; min-height:48px; cursor:pointer; }
    .choice input:checked + label { background:#eef4ff; border-color:#a9c4ff; box-shadow:0 0 0 4px rgba(80,132,255,.10); }
    .report-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
    .report-item { border:1px solid var(--line); border-radius:14px; padding:12px; background:#fff; }
    .preview-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:10px; margin-top:12px; }
    .signature-wrap { border:1px solid var(--line); border-radius:16px; padding:12px; background:#fbfdff; }
    .signature-canvas-wrap { border:1px dashed var(--line); border-radius:14px; background:#fff; overflow:hidden; }
    #signatureCanvas { display:block; width:100%; height:220px; touch-action:none; background:#fff; }
    .signature-actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
    .hidden { display:none !important; }
    @media (max-width:920px) {
      .app { padding:12px; }
      .layout { grid-template-columns:1fr; }
      .sidebar,.main { padding:14px; }
      .grid-2,.report-grid { grid-template-columns:1fr; }
      .actions { flex-direction:column; }
      .actions > * { width:100%; }
      .choice { flex:1 1 100%; }
      .toolbar { width:100%; }
      .toolbar button { width:100%; }
      .signature-actions { flex-direction:column; }
      .signature-actions > * { width:100%; }
      button,input[type="text"],textarea,select,input[type="file"] { min-height:48px; font-size:16px; }
      #signatureCanvas { height:200px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-logo">YDUQS</div>
        <div>
          <h1>Ronda Preventiva</h1>
          <p>Checklist técnico para registro de rondas técnicas nos prédios corporativos.</p>
        </div>
      </div>
      <div class="toolbar">
        <button class="btn-danger" id="btnResetTop" type="button">Reiniciar processo completo</button>
      </div>
    </header>

    <main class="layout">
      <aside class="panel sidebar">
        <div class="section-title">
          <h3>Fluxo</h3>
          <span class="pill" id="deviceBadge">Modo automático</span>
        </div>
        <div id="steps"></div>
      </aside>

      <section class="panel main">
        <div id="screen1"></div>
        <div id="screen2" class="hidden"></div>
        <div id="screen3" class="hidden"></div>
        <div id="screen4" class="hidden"></div>
      </section>
    </main>
  </div>

  <script>
    const LOGO = '';
    const ROUNDS = [
      {
        id: 'cpd',
        name: 'CPD',
        description: 'Verificação do ambiente, ativos e organização do CPD.',
        questions: [
          { id: 'cpd_1', text: 'O ar condicionado está funcionando?', kind: 'yesno', negativeObservation: 'Descreva o erro encontrado' },
          { id: 'cpd_2', text: 'A temperatura do ambiente está OK?', kind: 'yesno', negativeObservation: 'Descreva o erro encontrado' },
          { id: 'cpd_3', text: 'Os ativos de rede estão ligados?', kind: 'yesno', negativeObservation: 'Descreva o erro encontrado' },
          { id: 'cpd_4', text: 'O cabeamento está organizado?', kind: 'yesno', negativeObservation: 'Descreva o erro encontrado' },
          { id: 'cpd_5', text: 'O local está limpo?', kind: 'yesno', negativeObservation: 'Descreva o erro encontrado' }
        ]
      },
      {
        id: 'setorial',
        name: 'Ronda Setorial',
        description: 'Avaliação do ambiente dos andares e problemas recorrentes.',
        questions: [
          { id: 'set_1', text: 'A internet nos andares está estável?', kind: 'yesno', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'set_2', text: 'A organização dos cabos está OK?', kind: 'tri', negativeObservation: 'Descreva o problema encontrado' },
          {
            id: 'set_3',
            text: 'Foi encontrado algum equipamento que não deveria estar no local?',
            kind: 'yesno_followup',
            followUps: [
              { trigger: 'Sim', label: 'Qual equipamento ou situação fora do comum foi encontrada?', type: 'textarea', key: 'equipamento_fora' }
            ]
          },
          {
            id: 'set_4',
            text: 'Houve alguma reclamação sobre um erro recorrente ou em massa?',
            kind: 'yesno_followup',
            followUps: [
              { trigger: 'Sim', label: 'Descreva o problema relatado', type: 'textarea', key: 'descricao_problema' },
              { trigger: 'Sim', label: 'Há chamado aberto? Informe o número do chamado ou dos chamados', type: 'text', key: 'chamados_abertos' },
              { trigger: 'Sim', label: 'O time responsável já foi acionado? Qual time é esse?', type: 'text', key: 'time_acionado' }
            ]
          }
        ]
      },
      {
        id: 'salas',
        name: 'Ronda nas Salas de Reunião',
        description: 'Inspeção funcional de Poly, Teams, áudio e vídeo.',
        questions: [
          { id: 'sal_0', text: 'Qual a sala de reunião?', kind: 'text_required', placeholder: 'Ex.: Sala Rio de Janeiro' },
          { id: 'sal_1', text: 'A Polycon está ligada?', kind: 'yesno', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'sal_2', text: 'A Polycon está conectada na internet?', kind: 'yesno', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'sal_3', text: 'O usuário Teams está conectado?', kind: 'yesno', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'sal_4', text: 'O vídeo da Polycon está normal na sala?', kind: 'yesno', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'sal_5', text: 'O áudio da Polycon está normal na sala?', kind: 'yesno', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'sal_6', text: 'O vídeo da Polycon está normal para o ouvinte?', kind: 'yesno', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'sal_7', text: 'O áudio da Polycon está normal para o ouvinte?', kind: 'yesno', negativeObservation: 'Descreva o problema encontrado' },
          {
            id: 'sal_8',
            text: 'Algum problema não listado foi encontrado na Polycon?',
            kind: 'yesno_followup',
            followUps: [
              { trigger: 'Sim', label: 'Liste os problemas encontrados', type: 'textarea', key: 'problemas_nao_listados' },
              { trigger: 'Sim', label: 'Liste as soluções aplicadas', type: 'textarea', key: 'solucoes_aplicadas' }
            ]
          }
        ]
      }
    ];

    const formState = {
      tecnico: '',
      unidade: '',
      assinatura: '',
      fotos: [],
      roundId: '',
      answers: {},
      startedAt: '',
      deviceMode: '',
      assinaturaDigital: '',
      certificadoNome: '',
      certificadoData: ''
    };

    let currentStep = 1;
    let signaturePadReady = false;
    let isDrawing = false;
    let lastPoint = null;

    const steps = [
      { id:1, title:'Identificação', desc:'Dados iniciais' },
      { id:2, title:'Ronda', desc:'Escolha do checklist' },
      { id:3, title:'Checklist', desc:'Respostas e observações' },
      { id:4, title:'Relatório', desc:'Salvar e reiniciar' }
    ];

    const stepsEl = document.getElementById('steps');
    const deviceBadge = document.getElementById('deviceBadge');
    const screen1 = document.getElementById('screen1');
    const screen2 = document.getElementById('screen2');
    const screen3 = document.getElementById('screen3');
    const screen4 = document.getElementById('screen4');

    document.getElementById('btnResetTop').addEventListener('click', resetAll);

    init();

    function init() {
      detectDevice();
      renderSteps();
      renderScreen1();
      renderScreen2();
      renderScreen3();
      renderScreen4();
      showStep(1);
      window.addEventListener('resize', () => {
        detectDevice();
        renderSteps();
        if (currentStep === 4) {
          setupSignaturePad();
        }
      });
    }

    function detectDevice() {
      const mobile = window.matchMedia('(max-width: 920px)').matches || ('ontouchstart' in window);
      formState.deviceMode = mobile ? 'Mobile' : 'Desktop/Notebook';
      deviceBadge.textContent = `Modo automático: ${formState.deviceMode}`;
    }

    function renderSteps() {
      stepsEl.innerHTML = steps.map(step => {
        const cls = currentStep === step.id ? 'step active' : currentStep > step.id ? 'step done' : 'step';
        const badge = currentStep > step.id ? '✓' : step.id;
        return `<div class="${cls}">
          <div class="step-badge">${badge}</div>
          <div><div style="font-weight:800; color:var(--navy)">${step.title}</div><div class="muted" style="font-size:.92rem">${step.desc}</div></div>
        </div>`;
      }).join('');
    }

    function showStep(step) {
      currentStep = step;
      [screen1, screen2, screen3, screen4].forEach((el, idx) => el.classList.toggle('hidden', idx + 1 !== step));
      renderSteps();
      if (step === 3) renderScreen3();
      if (step === 4) {
        renderScreen4();
        setTimeout(setupSignaturePad, 50);
      }
      window.scrollTo({ top:0, behavior:'smooth' });
    }

    function getSelectedRound() {
      return ROUNDS.find(r => r.id === formState.roundId) || null;
    }

    function renderScreen1() {
      screen1.innerHTML = `
        <div class="section-title">
          <div>
            <h2>Identificação do técnico</h2>
            <div class="muted">Preencha as informações necessárias para identificação do técnico responsável e prédio de atuação.</div>
          </div>
          <span class="pill">Field Service</span>
        </div>

        <div class="card">
          <div class="grid grid-2">
            <div class="field">
              <label for="tecnico">Nome do técnico</label>
              <input id="tecnico" type="text" maxlength="120" placeholder="Ex.: Raphael Amaral" value="${escapeHtml(formState.tecnico)}" />
            </div>
            <div class="field">
              <label for="unidade">Unidade</label>
              <input id="unidade" type="text" maxlength="120" placeholder="Ex.: Rio de Janeiro" value="${escapeHtml(formState.unidade)}" />
            </div>
          </div>
        </div>

        <div class="card">
          <div class="section-title">
            <div>
              <h3>Fieldtask e evidências</h3>
              <div class="muted">Informe o número da Fieldtask e, em caso de erro, anexe as evidências.</div>
            </div>
          </div>
          <div class="grid grid-2">
            <div class="field">
              <label for="assinatura">Validação do Checklist (Fieldtask)</label>
              <input id="assinatura" type="text" maxlength="120" placeholder="Ex.: FIELDTASK0094643" value="${escapeHtml(formState.assinatura)}" />
            </div>
            <div class="field">
              <label for="fotos">Fotos de evidência (opcional, até 4)</label>
              <input id="fotos" type="file" accept="image/*" multiple />
            </div>
          </div>
          <div id="fotosPreview" class="preview-grid"></div>
        </div>

        <div class="actions">
          <span></span>
          <button class="btn-primary" id="toStep2" type="button">Continuar</button>
        </div>
      `;

      screen1.querySelector('#tecnico').addEventListener('input', e => formState.tecnico = e.target.value);
      screen1.querySelector('#unidade').addEventListener('input', e => formState.unidade = e.target.value);
      screen1.querySelector('#assinatura').addEventListener('input', e => formState.assinatura = e.target.value);
      screen1.querySelector('#fotos').addEventListener('change', handlePhotos);
      renderPhotoPreview();
      screen1.querySelector('#toStep2').addEventListener('click', () => {
        if (!formState.tecnico.trim() || !formState.unidade.trim()) {
          alert('Preencha o nome do técnico e a unidade.');
          return;
        }
        formState.startedAt = new Date().toISOString();
        showStep(2);
      });
    }

    function handlePhotos(e) {
      const files = Array.from(e.target.files || []).slice(0, 4);
      Promise.all(files.map(fileToDataURL)).then(images => {
        formState.fotos = images;
        renderPhotoPreview();
      });
    }

    function fileToDataURL(file) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(file);
      });
    }

    function renderPhotoPreview() {
      const el = document.getElementById('fotosPreview');
      if (!el) return;
      el.innerHTML = formState.fotos.length
        ? formState.fotos.map(src => `<img src="${src}" alt="Evidência" style="width:100%; height:92px; object-fit:cover; border-radius:12px; border:1px solid var(--line);" />`).join('')
        : `<div class="report-item muted">Nenhuma foto adicionada.</div>`;
    }

    function renderScreen2() {
      screen2.innerHTML = `
        <div class="section-title">
          <div>
            <h2>Selecione a ronda preventiva</h2>
            <div class="muted">Escolha abaixo o tipo de ronda preventiva.</div>
          </div>
        </div>
        <div class="grid grid-2">
          ${ROUNDS.map(round => `
            <button type="button" class="type-card ${formState.roundId === round.id ? 'selected' : ''}" data-round="${round.id}">
              <strong>${escapeHtml(round.name)}</strong>
              <span class="muted">${escapeHtml(round.description)}</span>
              <div style="margin-top:10px;"><span class="pill">${round.questions.length} pergunta(s)</span></div>
            </button>
          `).join('')}
        </div>
        <div class="actions">
          <button class="btn-secondary" id="back1" type="button">Voltar</button>
          <button class="btn-primary" id="toStep3" type="button">Ir para checklist</button>
        </div>
      `;
      screen2.querySelectorAll('[data-round]').forEach(btn => btn.addEventListener('click', () => {
        formState.roundId = btn.dataset.round;
        formState.answers = {};
        renderScreen2();
      }));
      screen2.querySelector('#back1').addEventListener('click', () => showStep(1));
      screen2.querySelector('#toStep3').addEventListener('click', () => {
        if (!formState.roundId) {
          alert('Selecione uma ronda preventiva.');
          return;
        }
        showStep(3);
      });
    }

    function renderScreen3() {
      const round = getSelectedRound();
      if (!round) {
        screen3.innerHTML = `<div class="section-title"><h2>Checklist</h2></div><div class="report-item muted">Selecione uma ronda na etapa anterior.</div>`;
        return;
      }
      screen3.innerHTML = `
        <div class="section-title">
          <div>
            <h2>${escapeHtml(round.name)}</h2>
            <div class="muted">${escapeHtml(round.description)}</div>
          </div>
          <span class="pill">${round.questions.length} pergunta(s)</span>
        </div>
        ${round.questions.map((q, i) => renderQuestion(q, i)).join('')}
        <div class="actions">
          <button class="btn-secondary" id="back2" type="button">Voltar</button>
          <button class="btn-primary" id="toStep4" type="button">Finalizar</button>
        </div>
      `;
      bindQuestionEvents(round);
      screen3.querySelector('#back2').addEventListener('click', () => showStep(2));
      screen3.querySelector('#toStep4').addEventListener('click', () => {
        if (!validateRound(round)) return;
        showStep(4);
      });
    }

    function renderQuestion(question, index) {
      const ans = formState.answers[question.id] || { answer:'', notes:'', extra:{} };
      if (question.kind === 'text_required') {
        return `<div class="question" data-question="${question.id}">
          <div class="question-head"><div class="q-num">${index+1}</div><div><div class="legend">${escapeHtml(question.text)}</div><div class="muted" style="font-size:.92rem;">Preencha o campo abaixo.</div></div></div>
          <div class="field">
            <label for="text_${question.id}">${escapeHtml(question.text)}</label>
            <input id="text_${question.id}" type="text" placeholder="${escapeHtml(question.placeholder || 'Digite aqui')}" value="${escapeHtml(ans.answer || '')}" />
          </div>
        </div>`;
      }

      const options = question.kind === 'tri' ? ['Sim','Não','Não se aplica'] : ['Sim','Não'];
      const showObs = (question.kind === 'yesno' || question.kind === 'tri') && ans.answer === 'Não';
      const followUps = (question.followUps || []).filter(f => f.trigger === ans.answer);

      return `<div class="question" data-question="${question.id}">
        <div class="question-head"><div class="q-num">${index+1}</div><div><div class="legend">${escapeHtml(question.text)}</div><div class="muted" style="font-size:.92rem;">Selecione a resposta adequada.</div></div></div>
        <div class="choice-group">
          ${options.map(opt => {
            const inputId = `${question.id}_${slugify(opt)}`;
            return `<div class="choice"><input id="${inputId}" type="radio" name="q_${question.id}" value="${opt}" ${ans.answer === opt ? 'checked' : ''} /><label for="${inputId}">${opt}</label></div>`;
          }).join('')}
        </div>
        <div class="field ${showObs ? '' : 'hidden'}" style="margin-top:14px;">
          <label for="note_${question.id}">${escapeHtml(question.negativeObservation || 'Observação')}</label>
          <textarea id="note_${question.id}" placeholder="Descreva o problema encontrado">${escapeHtml(ans.notes || '')}</textarea>
        </div>
        <div style="margin-top:12px;">
          ${followUps.map(f => `<div class="field" style="margin-top:10px;">
            <label for="extra_${question.id}_${f.key}">${escapeHtml(f.label)}</label>
            ${f.type === 'textarea'
              ? `<textarea id="extra_${question.id}_${f.key}" data-extra="${question.id}|${f.key}" placeholder="Digite aqui">${escapeHtml(ans.extra?.[f.key] || '')}</textarea>`
              : `<input id="extra_${question.id}_${f.key}" data-extra="${question.id}|${f.key}" type="text" value="${escapeHtml(ans.extra?.[f.key] || '')}" placeholder="Digite aqui" />`
            }
          </div>`).join('')}
        </div>
      </div>`;
    }

    function bindQuestionEvents(round) {
      round.questions.forEach(question => {
        const textInput = screen3.querySelector(`#text_${question.id}`);
        if (textInput) {
          textInput.addEventListener('input', e => {
            const prev = formState.answers[question.id] || { notes:'', extra:{} };
            formState.answers[question.id] = { answer:e.target.value, notes:prev.notes || '', extra:prev.extra || {} };
          });
        }

        screen3.querySelectorAll(`input[name="q_${question.id}"]`).forEach(input => {
          input.addEventListener('change', e => {
            const prev = formState.answers[question.id] || { notes:'', extra:{} };
            formState.answers[question.id] = { answer:e.target.value, notes:prev.notes || '', extra:prev.extra || {} };
            renderScreen3();
          });
        });

        const note = screen3.querySelector(`#note_${question.id}`);
        if (note) {
          note.addEventListener('input', e => {
            const prev = formState.answers[question.id] || { answer:'', extra:{} };
            formState.answers[question.id] = { ...prev, notes:e.target.value };
          });
        }
      });

      screen3.querySelectorAll('[data-extra]').forEach(el => {
        el.addEventListener('input', e => {
          const [qid, key] = e.target.dataset.extra.split('|');
          const prev = formState.answers[qid] || { answer:'', notes:'', extra:{} };
          prev.extra[key] = e.target.value;
          formState.answers[qid] = prev;
        });
      });
    }

    function validateRound(round) {
      for (const q of round.questions) {
        const st = formState.answers[q.id];
        if (q.kind === 'text_required' && !st?.answer?.trim()) {
          alert(`Preencha a pergunta: "${q.text}"`);
          return false;
        }
        if (q.kind !== 'text_required' && !st?.answer) {
          alert(`Responda a pergunta: "${q.text}"`);
          return false;
        }
        if ((q.kind === 'yesno' || q.kind === 'tri') && st.answer === 'Não' && !st.notes?.trim()) {
          alert(`Preencha a observação da pergunta: "${q.text}"`);
          return false;
        }
        if (q.followUps?.length) {
          for (const item of q.followUps.filter(f => f.trigger === st.answer)) {
            const val = st.extra?.[item.key] || '';
            if (!val.trim()) {
              alert(`Preencha o campo adicional: "${item.label}"`);
              return false;
            }
          }
        }
      }
      return true;
    }

    function buildReportObject() {
      const round = getSelectedRound();
      return {
        tecnico: formState.tecnico,
        unidade: formState.unidade,
        validacaoChecklist: formState.assinatura,
        assinaturaDigital: formState.assinaturaDigital,
        certificadoNome: formState.certificadoNome,
        certificadoData: formState.certificadoData,
        ronda: round?.name || '',
        geradoEm: formState.startedAt || new Date().toISOString(),
        perguntas: round?.questions.map((q, i) => {
          const st = formState.answers[q.id] || { answer:'', notes:'', extra:{} };
          return {
            ordem: i + 1,
            pergunta: q.text,
            resposta: st.answer || '',
            observacao: st.notes || '',
            camposAdicionais: (q.followUps || []).filter(f => f.trigger === st.answer).map(f => ({ campo:f.label, valor:st.extra?.[f.key] || '' }))
          };
        }) || []
      };
    }

    function renderScreen4() {
      const report = buildReportObject();
      const round = getSelectedRound();
      if (!round) {
        screen4.innerHTML = `<div class="section-title"><h2>Relatório</h2></div><div class="report-item muted">Finalize um checklist para gerar o relatório.</div>`;

      }

      screen4.innerHTML = `
        <div class="section-title">
          <div>
            <h2>Relatório pronto</h2>
            <div class="muted">Use SALVAR para escolher o local quando o navegador permitir. Caso contrário, o arquivo será baixado normalmente.</div>
          </div>
          <span class="pill">${escapeHtml(report.ronda)}</span>
        </div>

        <div class="report-box">
          <div class="report-grid">
            <div class="report-item"><strong>Técnico</strong><div>${escapeHtml(report.tecnico)}</div></div>
            <div class="report-item"><strong>Unidade</strong><div>${escapeHtml(report.unidade)}</div></div>
            <div class="report-item"><strong>Dispositivo</strong><div>${escapeHtml(formState.deviceMode)}</div></div>
            <div class="report-item"><strong>Data/Hora</strong><div>${new Date(report.geradoEm).toLocaleString('pt-BR')}</div></div>
            <div class="report-item"><strong>Ronda</strong><div>${escapeHtml(report.ronda)}</div></div>
            <div class="report-item"><strong>Validação do Checklist</strong><div>${escapeHtml(report.validacaoChecklist || '-')}</div></div>
            <div class="report-item"><strong>Certificado digital</strong><div>${escapeHtml(report.certificadoNome || '-')}</div></div>
          </div>
        </div>

        <div class="report-box">
          <div class="section-title">
            <div>
              <h3>Validação do Checklist</h3>
              <div class="muted">Assine com o dedo, mouse ou caneta. A assinatura será inserida no PDF gerado.</div>
            </div>
          </div>

          <div class="signature-wrap">
            <div class="signature-canvas-wrap">
              <canvas id="signatureCanvas"></canvas>
            </div>
            <div class="signature-actions">
              <button class="btn-secondary" id="btnClearSignature" type="button">Limpar assinatura</button>
              <span class="pill">${report.assinaturaDigital ? 'Assinatura capturada' : 'Assinatura pendente'}</span>
            </div>
          </div>

          <div class="grid grid-2" style="margin-top:14px;">
            <div class="field">
              <label for="certificadoDigital">Integração com certificado digital</label>
              <input id="certificadoDigital" type="file" accept=".pfx,.p12,.cer,.crt,.pem,.key,application/x-pkcs12,application/x-x509-ca-cert" />
            </div>
            <div class="field">
              <label for="certificadoNome">Certificado selecionado</label>
              <input id="certificadoNome" type="text" value="${escapeHtml(report.certificadoNome || '')}" placeholder="Nenhum certificado selecionado" readonly />
            </div>
          </div>
          <div class="muted" style="margin-top:8px;">O certificado fica registrado no relatório. A assinatura criptográfica real do PDF depende de solução externa de certificado/token.</div>
        </div>

        <div class="report-box">
          <div class="section-title"><h3>Checklist respondido</h3></div>
          <div class="grid">
            ${report.perguntas.map(p => `
              <div class="report-item">
                <strong>${p.ordem}. ${escapeHtml(p.pergunta)}</strong>
                <div style="margin-top:8px;"><strong>${p.pergunta === 'Qual a sala de reunião?' ? 'Sala informada' : 'Resposta'}:</strong> ${escapeHtml(p.resposta || '-')}</div>
                ${p.observacao ? `<div style="margin-top:6px;"><strong>Observação:</strong> ${escapeHtml(p.observacao)}</div>` : ''}
                ${(p.camposAdicionais || []).map(extra => `<div style="margin-top:6px;"><strong>${escapeHtml(extra.campo)}:</strong> ${escapeHtml(extra.valor || '-')}</div>`).join('')}
              </div>
            `).join('')}
          </div>
        </div>

        <div class="actions">
          <button class="btn-secondary" id="back3" type="button">Voltar</button>
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn-soft" id="btnSave" type="button">SALVAR</button>
            <button class="btn-primary" id="btnPdf" type="button">GERAR PDF</button>
            <button class="btn-secondary" id="btnExcel" type="button">GERAR EXCEL</button>
            <button class="btn-secondary" id="btnCsv" type="button">GERAR CSV</button>
            <button class="btn-secondary" id="btnChecklist" type="button">Novo checklist</button>

          </div>

      `;

      screen4.querySelector('#back3').addEventListener('click', () => showStep(3));
      screen4.querySelector('#btnSave').addEventListener('click', saveReportToChosenFolder);
      screen4.querySelector('#btnPdf').addEventListener('click', generatePdfDownload);
      screen4.querySelector('#btnExcel').addEventListener('click', generateExcelDownload);
      screen4.querySelector('#btnCsv').addEventListener('click', generateCsvDownload);
      screen4.querySelector('#btnChecklist').addEventListener('click', newChecklist);
      screen4.querySelector('#btnRestart').addEventListener('click', resetAll);
      screen4.querySelector('#btnClearSignature').addEventListener('click', clearSignature);
      screen4.querySelector('#certificadoDigital').addEventListener('change', handleCertificateFile);

    function setupSignaturePad() {
      const canvas = document.getElementById('signatureCanvas');
      if (!canvas) return;

      const ratio = Math.max(window.devicePixelRatio || 1, 1);
      const rect = canvas.getBoundingClientRect();
      const existing = formState.assinaturaDigital;

      canvas.width = Math.floor(rect.width * ratio);
      canvas.height = Math.floor(rect.height * ratio);
      const ctx = canvas.getContext('2d');
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      ctx.lineWidth = 2.2;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = '#081f5c';
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, rect.width, rect.height);

      if (existing) {
        const img = new Image();
        img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
        img.src = existing;
      }

      if (signaturePadReady) return;
      signaturePadReady = true;

      const getPoint = evt => {
        const r = canvas.getBoundingClientRect();
        const source = evt.touches && evt.touches[0] ? evt.touches[0] : evt;
        return { x: source.clientX - r.left, y: source.clientY - r.top };
      };

      const start = evt => {
        evt.preventDefault();
        isDrawing = true;
        lastPoint = getPoint(evt);
      };

      const move = evt => {
        if (!isDrawing) return;
        evt.preventDefault();
        const ctx2 = canvas.getContext('2d');
        const point = getPoint(evt);
        ctx2.beginPath();
        ctx2.moveTo(lastPoint.x, lastPoint.y);
        ctx2.lineTo(point.x, point.y);
        ctx2.stroke();
        lastPoint = point;
      };

      const end = () => {
        if (!isDrawing) return;
        isDrawing = false;
        lastPoint = null;
        formState.assinaturaDigital = canvas.toDataURL('image/png');
      };

      canvas.addEventListener('mousedown', start);
      canvas.addEventListener('mousemove', move);
      window.addEventListener('mouseup', end);
      canvas.addEventListener('touchstart', start, { passive:false });
      canvas.addEventListener('touchmove', move, { passive:false });
      window.addEventListener('touchend', end, { passive:false });
    }

    function clearSignature() {
      formState.assinaturaDigital = '';
      const canvas = document.getElementById('signatureCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      renderScreen4();
      setTimeout(setupSignaturePad, 50);
    }

    function handleCertificateFile(e) {
      const file = (e.target.files || [])[0];
      formState.certificadoNome = file ? file.name : '';
      formState.certificadoData = file ? new Date().toISOString() : '';
      const certificadoNome = screen4.querySelector('#certificadoNome');
      if (certificadoNome) certificadoNome.value = formState.certificadoNome || '';
    }

    function makeSmartFileName(ext = 'pdf') {
      const round = getSelectedRound();
      const d = new Date();
      const data = `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
      const nomeRonda = sanitizeFileNamePart((round?.name || 'Ronda').trim());
      const nomeTecnico = sanitizeFileNamePart((formState.tecnico || 'Tecnico').trim());
      return `${nomeRonda} - ${data} - ${nomeTecnico}.${ext}`;
    }

    function buildProfessionalPdf() {
      if (!(window.jspdf && window.jspdf.jsPDF)) {
        alert('A biblioteca de PDF não foi carregada. Verifique sua conexão e tente novamente.');
        return null;
      }

      const report = buildReportObject();
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit:'mm', format:'a4' });
      const pageWidth = doc.internal.pageSize.getWidth();
      const pageHeight = doc.internal.pageSize.getHeight();
      const margin = 12;
      let y = 14;

      const addHeader = () => {
        doc.setFillColor(8,31,92);
        doc.roundedRect(margin, 10, pageWidth - (margin * 2), 24, 5, 5, 'F');
        doc.setTextColor(255,255,255);
        doc.setFont('helvetica','bold');
        doc.setFontSize(16);
        doc.text('Relatório de Ronda Preventiva', margin + 6, 21);
        doc.setFont('helvetica','normal');
        doc.setFontSize(9);
        doc.text('YDUQS • Checklist técnico corporativo', margin + 6, 28);
        y = 42;
        doc.setTextColor(31,41,55);
      };

      const ensureSpace = needed => {
        if (y + needed > pageHeight - 15) {
          doc.addPage();
          addHeader();
        }
      };

      const section = title => {
        ensureSpace(12);
        doc.setFillColor(237,242,247);
        doc.roundedRect(margin, y - 4, pageWidth - (margin * 2), 9, 2, 2, 'F');
        doc.setFont('helvetica','bold');
        doc.setFontSize(11);
        doc.text(title, margin + 4, y + 2);
        y += 13;
      };

      const labelValue = (label, value) => {
        ensureSpace(8);
        doc.setFont('helvetica','bold');
        doc.setFontSize(10);
        const labelWidth = Math.max(34, Math.min(64, doc.getTextWidth(label) + 4));
        doc.text(label, margin, y);
        doc.setFont('helvetica','normal');
        const valueX = margin + labelWidth;
        const lines = doc.splitTextToSize(String(value || '-'), pageWidth - margin - valueX);
        doc.text(lines, valueX, y);
        y += Math.max(6, lines.length * 4.8);
      };

      const card = item => {
        const lines = [];
        lines.push(`${item.pergunta === 'Qual a sala de reunião?' ? 'Sala informada' : 'Resposta'}: ${item.resposta || '-'}`);
        if (item.observacao) lines.push(`Observação: ${item.observacao}`);
        (item.camposAdicionais || []).forEach(extra => lines.push(`${extra.campo}: ${extra.valor || '-'}`));
        const titleLines = doc.splitTextToSize(`${item.ordem}. ${item.pergunta}`, pageWidth - (margin * 2) - 8);
        const bodyLines = lines.flatMap(line => doc.splitTextToSize(line, pageWidth - (margin * 2) - 8));
        const h = 10 + titleLines.length * 5 + bodyLines.length * 4.7 + 6;
        ensureSpace(h);
        doc.setDrawColor(220,229,240);
        doc.setFillColor(252,253,255);
        doc.roundedRect(margin, y - 4, pageWidth - (margin * 2), h, 3, 3, 'FD');
        doc.setFont('helvetica','bold');
        doc.setFontSize(10);
        doc.text(titleLines, margin + 4, y + 2);
        let innerY = y + 2 + titleLines.length * 5;
        doc.setFont('helvetica','normal');
        doc.setFontSize(9.2);
        bodyLines.forEach(line => {
          doc.text(line, margin + 4, innerY);
          innerY += 4.7;
        });
        y += h + 4;
      };

      addHeader();
      section('Identificação');
      labelValue('Técnico:', report.tecnico);
      labelValue('Unidade:', report.unidade);
      labelValue('Dispositivo:', formState.deviceMode);
      labelValue('Ronda:', report.ronda);
      labelValue('Validação do Checklist:', report.validacaoChecklist || '-');
      if (report.ronda === 'Ronda nas Salas de Reunião') {
        const sala = report.perguntas.find(p => p.pergunta === 'Qual a sala de reunião?')?.resposta || '-';
        labelValue('Sala de reunião:', sala);
      }
      labelValue('Gerado em:', new Date(report.geradoEm).toLocaleString('pt-BR'));
      labelValue('Certificado digital:', report.certificadoNome || '-');

      section('Checklist respondido');
      report.perguntas.forEach(card);

      if (formState.fotos && formState.fotos.length) {
        section('Evidências fotográficas');
        formState.fotos.forEach(img => {
          try {
            ensureSpace(45);
            doc.addImage(img, 'JPEG', margin, y, 80, 45);
            y += 50;
          } catch(e) {
            try {
              doc.addImage(img, 'PNG', margin, y, 80, 45);
              y += 50;
            } catch(err) {}
          }
        });
      }

      section('Validação do Checklist');
      ensureSpace(42);
      doc.setDrawColor(180, 190, 205);
      doc.line(margin + 8, y + 24, pageWidth - margin - 8, y + 24);
      doc.setFont('helvetica','bold');
      doc.setFontSize(10);
      doc.text('Validação do Checklist', margin + 8, y + 30);
      doc.setFont('helvetica','normal');
      doc.setFontSize(9);
      doc.text(`Técnico: ${report.tecnico || '-'}`, margin + 8, y + 35);

      if (report.assinaturaDigital) {
        try {
          doc.addImage(report.assinaturaDigital, 'PNG', margin + 12, y + 2, 70, 18, undefined, 'FAST');
        } catch (e) {}
      }

      const totalPages = doc.getNumberOfPages();
      for (let i = 1; i <= totalPages; i++) {
        doc.setPage(i);
        doc.setTextColor(100,116,139);
        doc.setFontSize(8.2);
        doc.text(`Página ${i} de ${totalPages}`, pageWidth - 28, pageHeight - 8);
      }
      return doc;
    }

    function getExportRows() {
      const report = buildReportObject();
      return report.perguntas.map(item => ({
        Técnico: report.tecnico,
        Unidade: report.unidade,
        Ronda: report.ronda,
        'Validação do Checklist': report.validacaoChecklist || '',
        'Data/Hora': new Date(report.geradoEm).toLocaleString('pt-BR'),
        Pergunta: item.pergunta,
        Resposta: item.resposta || '',
        Observação: item.observacao || '',
        'Campos adicionais': (item.camposAdicionais || []).map(extra => `${extra.campo}: ${extra.valor || ''}`).join(' | '),
        'Certificado digital': report.certificadoNome || ''
      }));
    }

    function sanitizeFileNamePart(value) {
      return String(value || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[\\/:*?"<>|]/g, '')
        .replace(/\s+/g, ' ')
        .trim() || 'Arquivo';
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 15000);
    }

    function generateExcelDownload() {
      if (!(window.XLSX && window.XLSX.utils)) {
        alert('A biblioteca de Excel não foi carregada. Verifique sua conexão e tente novamente.');
        return;
      }
      const rows = getExportRows();
      const worksheet = XLSX.utils.json_to_sheet(rows);
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, 'Ronda');
      XLSX.writeFile(workbook, makeSmartFileName('xlsx'));
    }

    function escapeCsvValue(value) {
      const text = String(value ?? '');
      if (/[;"\n\r]/.test(text)) return `"${text.replace(/"/g, '""')}"`;
      return text;
    }

    function generateCsvDownload() {
      const rows = getExportRows();
      if (!rows.length) {
        alert('Não há dados para exportar.');
        return;
      }
      const headers = Object.keys(rows[0]);
      const lines = [
        headers.map(escapeCsvValue).join(';'),
        ...rows.map(row => headers.map(header => escapeCsvValue(row[header])).join(';'))
      ];
      const blob = new Blob(['\uFEFF' + lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
      downloadBlob(blob, makeSmartFileName('csv'));
    }

    async function saveReportToChosenFolder() {
      try {
        const doc = buildProfessionalPdf();
        if (!doc) return;
        const filename = makeSmartFileName('pdf');
        const pdfBlob = doc.output('blob');
        const canPickLocation = window.isSecureContext && 'showSaveFilePicker' in window && typeof window.showSaveFilePicker === 'function';

        if (canPickLocation) {
          try {
            const handle = await window.showSaveFilePicker({
              suggestedName: filename,
              types: [{ description:'Arquivo PDF', accept: { 'application/pdf':['.pdf'] } }]
            });
            const writable = await handle.createWritable();
            await writable.write(pdfBlob);
            await writable.close();
            alert('Relatório salvo com sucesso.');
            return;
          } catch (error) {
            if (error && error.name === 'AbortError') return;
          }
        }

        downloadBlob(pdfBlob, filename);
      } catch (error) {
        console.error('Falha ao salvar PDF:', error);
        alert('Não foi possível salvar o PDF.');
      }
    }

    function generatePdfDownload() {
      const doc = buildProfessionalPdf();
      if (!doc) return;
      doc.save(makeSmartFileName('pdf'));
    }

    function newChecklist() {
      formState.roundId = '';
      formState.answers = {};
      formState.assinaturaDigital = '';
      formState.certificadoNome = '';
      formState.certificadoData = '';
      showStep(2);
      renderScreen2();
      renderScreen3();
      renderScreen4();
    }

    function resetAll() {
      if (!confirm('Deseja apagar todo o processo e voltar para a aba Identificação?')) return;
      formState.tecnico = '';
      formState.unidade = '';
      formState.assinatura = '';
      formState.fotos = [];
      formState.roundId = '';
      formState.answers = {};
      formState.startedAt = '';
      formState.assinaturaDigital = '';
      formState.certificadoNome = '';
      formState.certificadoData = '';
      detectDevice();
      renderScreen1();
      renderScreen2();
      renderScreen3();
      renderScreen4();
      showStep(1);
    }

    function slugify(text) {
      return (text || '').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]+/g,'_').replace(/^_|_$/g,'').toLowerCase();
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }
  </script>
