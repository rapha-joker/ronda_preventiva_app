<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#081f5c" />
  <title>Ronda Preventiva YDUQS</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --navy:#081f5c; --navy2:#12327d; --cyan:#4db7cc; --bg:#f4f7fb; --card:#fff;
      --line:#dce5f0; --text:#16263f; --muted:#66758b; --success:#129c56; --danger:#cf3b2f;
      --shadow:0 12px 34px rgba(8,31,92,.10); --r-xl:24px; --r-lg:18px; --r-md:14px;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,Arial,sans-serif; background:linear-gradient(180deg,#f7f9fc 0%,#eef3f9 100%); color:var(--text); }
    .app { max-width:1180px; margin:0 auto; padding:18px; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:18px; }
    .brand { display:flex; align-items:center; gap:14px; }
    .brand-logo { background:#fff; border:1px solid var(--line); border-radius:16px; padding:8px 12px; box-shadow:var(--shadow); min-width:120px; display:grid; place-items:center; color:var(--navy); font-weight:800; }
    .brand h1 { margin:0; font-size:clamp(1.2rem,2vw,1.9rem); color:var(--navy); }
    .brand p { margin:4px 0 0; color:var(--muted); }
    .toolbar { display:flex; gap:10px; flex-wrap:wrap; }
    .layout { display:grid; grid-template-columns:290px 1fr; gap:18px; }
    .panel { background:var(--card); border:1px solid var(--line); border-radius:var(--r-xl); box-shadow:var(--shadow); }
    .sidebar { padding:20px; }
    .main { padding:22px; min-height:680px; }
    .step { border:1px solid var(--line); border-radius:var(--r-lg); padding:14px; display:flex; gap:12px; margin-bottom:12px; background:#fbfdff; }
    .step.active { background:#eef4ff; border-color:#b5cbff; }
    .step.done { background:#effbf3; border-color:#bfe7cd; }
    .step-badge { min-width:34px; height:34px; border-radius:12px; display:grid; place-items:center; background:var(--navy); color:#fff; font-weight:800; }
    .step.done .step-badge { background:var(--success); }
    .section-title { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:14px; }
    .section-title h2,.section-title h3 { margin:0; color:var(--navy); }
    .muted { color:var(--muted); }
    .pill { display:inline-flex; align-items:center; gap:8px; border-radius:999px; padding:8px 12px; background:#eef7fa; border:1px solid #d4ebf1; color:#0b6474; font-size:.9rem; font-weight:700; }
    .card,.question,.report-box { border:1px solid var(--line); border-radius:20px; padding:18px; background:#fff; margin-bottom:16px; }
    .grid { display:grid; gap:14px; }
    .grid-2 { grid-template-columns:repeat(2,minmax(0,1fr)); }
    .field { display:grid; gap:8px; }
    label,.legend { font-weight:700; font-size:.96rem; }
    input[type="text"], textarea, select { width:100%; border:1px solid var(--line); border-radius:14px; padding:13px 14px; font:inherit; color:var(--text); background:#fff; outline:none; }
    input[type="text"]:focus, textarea:focus, select:focus { border-color:#8cb6ff; box-shadow:0 0 0 4px rgba(80,132,255,.12); }
    textarea { min-height:96px; resize:vertical; }
    input[type="file"] { width:100%; border:1px dashed var(--line); border-radius:14px; padding:10px; font:inherit; background:#fbfdff; }
    button { border:none; border-radius:14px; padding:12px 16px; font:inherit; font-weight:700; cursor:pointer; transition:.15s ease; }
    button:hover { transform:translateY(-1px); }
    .btn-primary { background:linear-gradient(135deg,var(--navy),var(--navy2)); color:#fff; }
    .btn-secondary { background:#fff; border:1px solid var(--line); color:var(--text); }
    .btn-soft { background:#eef7fa; border:1px solid #d4ebf1; color:#0b6474; }
    .btn-danger { background:#fff1ef; border:1px solid #ffd5d0; color:var(--danger); }
    .actions { display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-top:20px; }
    .type-card { border:1px solid var(--line); border-radius:18px; padding:16px; background:#fbfdff; cursor:pointer; transition:.2s ease; text-align:left; }
    .type-card.selected,.type-card:hover { background:#eef4ff; border-color:#b5cbff; }
    .type-card strong { display:block; margin-bottom:8px; color:var(--navy); }
    .question-head { display:flex; gap:12px; align-items:flex-start; margin-bottom:12px; }
    .q-num { min-width:34px; height:34px; border-radius:12px; display:grid; place-items:center; background:var(--navy); color:#fff; font-weight:800; }
    .choice-group { display:flex; gap:10px; flex-wrap:wrap; }
    .choice { position:relative; flex:1 1 120px; }
    .choice input { position:absolute; opacity:0; pointer-events:none; }
    .choice label { display:block; text-align:center; border:1px solid var(--line); border-radius:14px; padding:12px 14px; background:#fff; min-height:48px; cursor:pointer; }
    .choice input:checked + label { background:#eef4ff; border-color:#a9c4ff; box-shadow:0 0 0 4px rgba(80,132,255,.10); }
    .check-flag-row { display:flex; align-items:flex-start; gap:10px; border:1px solid var(--line); border-radius:14px; padding:12px 14px; background:#fff; cursor:pointer; text-align:left; }
    .check-flag-row input[type="checkbox"] { position:static; opacity:1; pointer-events:auto; width:18px; height:18px; margin:2px 0 0; accent-color:var(--navy); flex:0 0 auto; }
    .check-flag-row span { flex:1; line-height:1.45; }
    .check-flag-row.checked { background:#eef4ff; border-color:#a9c4ff; box-shadow:0 0 0 4px rgba(80,132,255,.10); }
    .report-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
    .report-item { border:1px solid var(--line); border-radius:14px; padding:12px; background:#fff; }
    .preview-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:10px; margin-top:12px; }
    .signature-wrap { border:1px solid var(--line); border-radius:16px; padding:12px; background:#fbfdff; }
    .signature-canvas-wrap { border:1px dashed var(--line); border-radius:14px; background:#fff; overflow:hidden; }
    #signatureCanvas { display:block; width:100%; height:220px; touch-action:none; background:#fff; cursor:crosshair; user-select:none; -webkit-user-select:none; }
    .signature-actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
    .hidden { display:none !important; }
    @media (max-width:920px) {
      .app { padding:12px; }
      .layout { grid-template-columns:1fr; }
      .sidebar,.main { padding:14px; }
      .grid-2,.report-grid { grid-template-columns:1fr; }
      .actions { flex-direction:column; }
      .actions > * { width:100%; }
      .choice { flex:1 1 100%; }
      .toolbar { width:100%; }
      .toolbar button { width:100%; }
      .signature-actions { flex-direction:column; }
      .signature-actions > * { width:100%; }
      button,input[type="text"],textarea,select,input[type="file"] { min-height:48px; font-size:16px; }
      #signatureCanvas { height:200px; }
    }
  
    .field-error{ border:2px solid #cf3b2f !important; box-shadow:0 0 0 3px rgba(207,59,47,.12) !important; }
    .validation-message{ color:#cf3b2f; font-size:.9rem; margin-top:6px; }
</style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-logo">YDUQS</div>
        <div>
          <h1>Ronda Preventiva</h1>
          <p>Checklist técnico para registro de rondas técnicas nos prédios corporativos.</p>
        </div>
      </div>
      <div class="toolbar">
        <button class="btn-danger" id="btnResetTop" type="button">Reiniciar processo completo</button>
      </div>
    </header>

    <main class="layout">
      <aside class="panel sidebar">
        <div class="section-title">
          <h3>Fluxo</h3>
          <span class="pill" id="deviceBadge">Modo automático</span>
        </div>
        <div id="steps"></div>
      </aside>

      <section class="panel main">
        <div id="screen1"></div>
        <div id="screen2" class="hidden"></div>
        <div id="screen3" class="hidden"></div>
        <div id="screen4" class="hidden"></div>
      </section>
    </main>
  </div>

  <script>
    const LOGO = '';
    
    const ROUNDS = [
      {
        id: 'cpd',
        name: 'CPD',
        description: 'Verificação do ambiente, ativos e organização do CPD.',
        questions: [
          { id: 'cpd_0', text: 'Andar', kind: 'text_required', placeholder: 'Ex.: 3º andar' },
          { id: 'cpd_00', text: 'Tempo total de ronda (min)', kind: 'text_required', placeholder: 'Ex.: 25' },
          { id: 'cpd_1', text: 'Ar-condicionado operante e sem alarmes (temperatura/umidade adequadas)?', kind: 'yesno', observationTrigger: 'Não', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'cpd_2', text: 'Nobreaks (UPS) sem alarmes; carga e autonomia dentro do esperado?', kind: 'yesno', observationTrigger: 'Não', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'cpd_3', text: 'Switches com LEDs normais, sem portas com erro?', kind: 'yesno', observationTrigger: 'Não', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'cpd_4', text: 'Servidores ligados, sem alertas?', kind: 'yesno', observationTrigger: 'Não', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'cpd_5', text: 'Organização e limpeza do ambiente (sem obstruções, cabos identificados)?', kind: 'yesno', observationTrigger: 'Não', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'cpd_6', text: 'Observações', kind: 'textarea_optional', placeholder: 'Descreva observações adicionais' },
          { id: 'cpd_7', text: 'Riscos/Planos de ação', kind: 'textarea_optional', placeholder: 'Descreva riscos e planos de ação' }
        ]
      },
      {
        id: 'setorial',
        name: 'Ronda Setorial',
        description: 'Avaliação do ambiente dos andares e problemas recorrentes.',
        questions: [
          { id: 'set_0', text: 'Andar', kind: 'text_required', placeholder: 'Ex.: 3º andar' },
          { id: 'set_00', text: 'Tempo total de ronda (min)', kind: 'text_required', placeholder: 'Ex.: 25' },
          { id: 'set_wifi_section', text: 'WIFI', kind: 'section' },
          { id: 'set_wifi_1', text: 'Identificar problemas de conexão por setor (usuários e dispositivos afetados). Houve alguma ocorrência?', kind: 'yesno', observationTrigger: 'Sim', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'set_wifi_2', text: 'Avaliar comportamentos anormais de acesso a sistemas (latência/perdas). Houve alguma ocorrência?', kind: 'yesno', observationTrigger: 'Sim', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'set_wifi_3', text: 'Teste de velocidade e sinal em pontos críticos (RSSI/SNR). O teste foi satisfatório?', kind: 'yesno', observationTrigger: 'Não', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'set_wifi_obs', text: 'Observações', kind: 'textarea_optional', placeholder: 'Descreva observações sobre o WIFI' },
          { id: 'set_wifi_pred_section', text: 'Itens preditivos sugeridos', kind: 'section_minor' },
          { id: 'set_wifi_pred', text: 'Itens preditivos sugeridos', kind: 'checkboxes_optional', options: ['Checar utilização de canais e interferências (co-canal/adjacente)', 'Verificar potência/transmissão e cobertura (heatmap rápido)', 'Revisar política de expiração de senhas/certificados (WPA2-Enterprise/802.1X)'] },
          { id: 'set_wifi_ajustes', text: 'Ajustes Recomendados', kind: 'textarea_optional', placeholder: 'Descreva os ajustes recomendados' },
          { id: 'set_prn_section', text: 'IMPRESSORAS', kind: 'section' },
          { id: 'set_prn_nome', text: 'Nome da impressora', kind: 'text_required', placeholder: 'Ex.: HP LaserJet - Secretaria' },
          { id: 'set_prn_1', text: 'Status: ligada e sem erros no painel?', kind: 'yesno', observationTrigger: 'Não', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'set_prn_2', text: 'Tipo de conexão: rede cabeada com IP acessível (ping)?', kind: 'yesno', observationTrigger: 'Não', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'set_prn_3', text: 'Qualidade de impressão (teste de página) sem falhas/listras?', kind: 'yesno', observationTrigger: 'Não', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'set_prn_4', text: 'Papel corretamente carregado e sem atolamentos?', kind: 'yesno', observationTrigger: 'Não', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'set_prn_5', text: 'Nível de toner/tinta acima de 20% ou kit de reposição disponível?', kind: 'yesno', observationTrigger: 'Não', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'set_prn_6', text: 'Status do coletor NDD', kind: 'checkboxes_optional', options: ['Comunicação', 'Contador ativo'] },
          { id: 'set_prn_pred_section', text: 'Itens preditivos sugeridos', kind: 'section_minor' },
          { id: 'set_prn_pred', text: 'Itens preditivos sugeridos', kind: 'checkboxes_optional', options: ['Conferir estoque mínimo de suprimentos (toner, tambor, fusor)'] },
          { id: 'set_prn_chamados', text: 'Chamados/Peças', kind: 'textarea_optional', placeholder: 'Descreva chamados abertos e peças necessárias' }
        ]
      },
      {
        id: 'salas',
        name: 'Ronda Sala de Reunião',
        description: 'Inspeção física, lógica e preditiva dos recursos da sala.',
        questions: [
          { id: 'sal_0', text: 'Qual a sala de reunião?', kind: 'text_required', placeholder: 'Ex.: Sala Rio de Janeiro' },
          { id: 'sal_00', text: 'Andar', kind: 'text_required', placeholder: 'Ex.: 3º andar' },
          { id: 'sal_000', text: 'Tempo total de ronda (min)', kind: 'text_required', placeholder: 'Ex.: 25' },

          { id: 'sal_section', text: 'SALA DE REUNIÃO', kind: 'section' },
          { id: 'sal_fis_section', text: 'Funcionamento Físico', kind: 'section_minor' },
          { id: 'sal_fis_1', text: 'Equipamento de videoconferência liga e inicializa sem alertas?', kind: 'yesno', observationTrigger: 'Não', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'sal_fis_2', text: 'Câmera apresentou problemas?', kind: 'yesno', observationTrigger: 'Sim', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'sal_fis_3', text: 'TV/Monitores ligam, sem pixels mortos ou manchas?', kind: 'yesno', observationTrigger: 'Não', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'sal_fis_4', text: 'Rede cabeada (ponto RJ45) com link e LED ativo?', kind: 'yesno', observationTrigger: 'Não', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'sal_fis_5', text: 'Integridade dos periféricos (câmeras, microfones, caixas de som, cabos HDMI/USB):', kind: 'custom_options', options: ['Boa', 'Razoável', 'Ruim'], observationTriggers: ['Razoável', 'Ruim'], negativeObservation: 'Descreva o problema encontrado' },
          { id: 'sal_fis_6', text: 'Organização dos cabos e disponibilidade de adaptadores (HDMI/USB-C/DP):', kind: 'custom_options', options: ['Boa', 'Razoável', 'Ruim'], observationTriggers: ['Razoável', 'Ruim'], negativeObservation: 'Descreva o problema encontrado' },

          { id: 'sal_log_section', text: 'Funcionamento Lógico', kind: 'section_minor' },
          { id: 'sal_log_1', text: 'Windows ativado e atualizado (sem alertas de ativação)?', kind: 'yesno', observationTrigger: 'Não', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'sal_log_2', text: 'Conexão do equipamento de videoconferência (Teams/Zoom/Webex) testada. Apresentou problemas?', kind: 'yesno', observationTrigger: 'Sim', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'sal_log_3', text: 'Áudio: teste de microfone/alto-falantes:', kind: 'custom_options', options: ['OK', 'Não OK'], observationTriggers: ['Não OK'], negativeObservation: 'Descreva o problema encontrado' },
          { id: 'sal_log_4', text: 'Vídeo: câmera reconhecida e com qualidade adequada?', kind: 'yesno', observationTrigger: 'Não', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'sal_log_5', text: 'Teste de compartilhamento de tela (HDMI e sem fio, se aplicável):', kind: 'custom_options', options: ['OK', 'Não OK', 'Não se aplica'], observationTriggers: ['Não OK'], negativeObservation: 'Descreva o problema encontrado' },
          { id: 'sal_log_6', text: 'Teste de compartilhamento via Clickshare:', kind: 'custom_options', options: ['OK', 'Não OK'], observationTriggers: ['Não OK'], negativeObservation: 'Descreva o problema encontrado', onlyIfBuilding: 'Montreal' },
          { id: 'sal_log_7', text: 'Teste de uso do Scribe:', kind: 'custom_options', options: ['OK', 'Não OK'], observationTriggers: ['Não OK'], negativeObservation: 'Descreva o problema encontrado', onlyIfBuilding: 'Montreal' },

          { id: 'sal_pred_section', text: 'Itens preditivos sugeridos', kind: 'section_minor' },
          { id: 'sal_pred_flags', text: 'Itens preditivos sugeridos', kind: 'checkboxes_optional', options: ['Verificar firmware de codecs/câmeras/TVs e agendar atualização se necessário', 'Inspecionar conectores e cabos por desgaste/folga (substituir preventivamente)'] },
          { id: 'sal_pred_fotos', text: 'Registrar fotos de anomalias físicas para histórico', kind: 'photo_upload_optional' },
          { id: 'sal_acoes', text: 'Ações/Peças a providenciar', kind: 'textarea_optional', placeholder: 'Descreva ações e peças a providenciar' },

          { id: 'sal_prn_section', text: 'IMPRESSORAS', kind: 'section' },
          { id: 'sal_prn_1', text: 'Status: está ligada e sem erros no painel?', kind: 'yesno', observationTrigger: 'Não', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'sal_prn_2', text: 'Tipo de conexão: rede cabeada com IP acessível (ping)?', kind: 'yesno', observationTrigger: 'Não', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'sal_prn_3', text: 'Qualidade de impressão (teste de página) sem falhas/listras?', kind: 'yesno', observationTrigger: 'Não', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'sal_prn_4', text: 'Papel corretamente carregado e sem atolamentos?', kind: 'yesno', observationTrigger: 'Não', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'sal_prn_5', text: 'Nível de toner/tinta acima de 20% ou kit de reposição disponível?', kind: 'yesno', observationTrigger: 'Não', negativeObservation: 'Descreva o problema encontrado' },
          { id: 'sal_prn_6', text: 'Status do coletor NDD', kind: 'checkboxes_optional', options: ['Comunicação', 'Contador ativo'] },
          { id: 'sal_prn_pred_section', text: 'Itens preditivos sugeridos', kind: 'section_minor' },
          { id: 'sal_prn_pred', text: 'Itens preditivos sugeridos', kind: 'checkboxes_optional', options: ['Conferir estoque mínimo de suprimentos (toner, tambor, fusor)'] },
          { id: 'sal_prn_chamados', text: 'Chamados/Peças', kind: 'textarea_optional', placeholder: 'Descreva chamados e peças necessárias' }
        ]
      }
    ];


    const formState = {
      tecnico: '',
      unidade: '',
      assinatura: '',
      fotos: [],
      roundId: '',
      answers: {},
      startedAt: '',
      deviceMode: '',
      assinaturaDigital: '',
      certificadoNome: '',
      certificadoData: ''
    };

    let currentStep = 1;
    let isDrawing = false;
    let lastPoint = null;

    const steps = [
      { id:1, title:'Identificação', desc:'Dados iniciais' },
      { id:2, title:'Ronda', desc:'Escolha do checklist' },
      { id:3, title:'Checklist', desc:'Respostas e observações' },
      { id:4, title:'Relatório', desc:'Salvar e reiniciar' }
    ];

    const stepsEl = document.getElementById('steps');
    const deviceBadge = document.getElementById('deviceBadge');
    const screen1 = document.getElementById('screen1');
    const screen2 = document.getElementById('screen2');
    const screen3 = document.getElementById('screen3');
    const screen4 = document.getElementById('screen4');

    document.getElementById('btnResetTop').addEventListener('click', resetAll);

    init();

    function init() {
      detectDevice();
      renderSteps();
      renderScreen1();
      renderScreen2();
      renderScreen3();
      renderScreen4();
      showStep(1);
      window.addEventListener('resize', () => {
        detectDevice();
        renderSteps();
        if (currentStep === 4) {
          setupSignaturePad();
        }
      });
    }

    function detectDevice() {
      const mobile = window.matchMedia('(max-width: 920px)').matches || ('ontouchstart' in window);
      formState.deviceMode = mobile ? 'Mobile' : 'Desktop/Notebook';
      deviceBadge.textContent = `Modo automático: ${formState.deviceMode}`;
    }

    function renderSteps() {
      stepsEl.innerHTML = steps.map(step => {
        const cls = currentStep === step.id ? 'step active' : currentStep > step.id ? 'step done' : 'step';
        const badge = currentStep > step.id ? '✓' : step.id;
        return `<div class="${cls}">
          <div class="step-badge">${badge}</div>
          <div><div style="font-weight:800; color:var(--navy)">${step.title}</div><div class="muted" style="font-size:.92rem">${step.desc}</div></div>
        </div>`;
      }).join('');
    }

    function showStep(step) {
      currentStep = step;
      [screen1, screen2, screen3, screen4].forEach((el, idx) => el.classList.toggle('hidden', idx + 1 !== step));
      renderSteps();
      if (step === 3) renderScreen3();
      if (step === 4) {
        renderScreen4();
        setTimeout(setupSignaturePad, 50);
      }
      window.scrollTo({ top:0, behavior:'smooth' });
    }

    function getSelectedRound() {
      return ROUNDS.find(r => r.id === formState.roundId) || null;
    }

    
    function renderScreen1() {
      screen1.innerHTML = `
        <div class="section-title">
          <div>
            <h2>Identificação do técnico</h2>
            <div class="muted">Preencha as informações necessárias para identificação do técnico responsável e prédio de atuação.</div>
          </div>
          <span class="pill">Field Service</span>
        </div>

        <div class="card">
          <div class="grid grid-2">
            <div class="field">
              <label for="tecnico">Nome do técnico</label>
              <input id="tecnico" type="text" maxlength="120" placeholder="Ex.: Raphael Amaral" value="${escapeHtml(formState.tecnico)}" />
            </div>
            <div class="field">
              <label for="unidade">Unidade</label>
              <input id="unidade" type="text" maxlength="120" placeholder="Ex.: Rio de Janeiro" value="${escapeHtml(formState.unidade)}" />
            </div>
          </div>
        </div>

        <div class="card">
          <div class="section-title">
            <div>
              <h3>Fieldtask</h3>
              <div class="muted">Informe o número da Fieldtask para validação do checklist.</div>
            </div>
          </div>

    function shouldShowQuestion(question) {
      if (!question.onlyIfBuilding) return true;
      return String(formState.unidade || '').trim().toLowerCase() === String(question.onlyIfBuilding).trim().toLowerCase();
    }

    function renderQuestion(question, index) {
      if (!shouldShowQuestion(question)) return '';
      const ans = formState.answers[question.id] || { answer:'', notes:'', extra:{}, files:[] };

      if (question.kind === 'section' || question.kind === 'section_minor') {
        return `<div class="question" data-question="${question.id}" style="border-style:dashed; background:${question.kind === 'section' ? 'rgba(8,31,92,.04)' : 'rgba(77,183,204,.08)'};">
          <div class="question-head">
            <div style="width:100%;">
              <div class="legend" style="font-size:${question.kind === 'section' ? '1.05rem' : '.98rem'}; text-transform:${question.kind === 'section' ? 'uppercase' : 'none'}; letter-spacing:${question.kind === 'section' ? '.04em' : 'normal'};">${escapeHtml(question.text)}</div>
            </div>
          </div>
        </div>`;
      }

      if (question.kind === 'text_required') {
        return `<div class="question" data-question="${question.id}">
          <div class="question-head"><div class="q-num">${index+1}</div><div><div class="legend">${escapeHtml(question.text)}</div><div class="muted" style="font-size:.92rem;">Preencha o campo abaixo.</div></div></div>
          <div class="field">
            <label for="text_${question.id}">${escapeHtml(question.text)}</label>
            <input id="text_${question.id}" type="text" placeholder="${escapeHtml(question.placeholder || 'Digite aqui')}" value="${escapeHtml(ans.answer || '')}" />
          </div>
        </div>`;
      }

      if (question.kind === 'textarea_optional') {
        return `<div class="question" data-question="${question.id}">
          <div class="question-head"><div class="q-num">${index+1}</div><div><div class="legend">${escapeHtml(question.text)}</div><div class="muted" style="font-size:.92rem;">Preencha o campo abaixo.</div></div></div>
          <div class="field">
            <label for="textarea_${question.id}">${escapeHtml(question.text)}</label>
            <textarea id="textarea_${question.id}" placeholder="${escapeHtml(question.placeholder || 'Digite aqui')}">${escapeHtml(ans.answer || '')}</textarea>
          </div>
        </div>`;
      }

      if (question.kind === 'photo_upload_optional') {
        const files = Array.isArray(ans.files) ? ans.files : [];
        return `<div class="question" data-question="${question.id}">
          <div class="question-head"><div class="q-num">${index+1}</div><div><div class="legend">${escapeHtml(question.text)}</div><div class="muted" style="font-size:.92rem;">Anexe fotos para registro histórico.</div></div></div>
          <div class="field">
            <label for="photo_${question.id}">${escapeHtml(question.text)}</label>
            <input id="photo_${question.id}" type="file" accept="image/*" multiple />
          </div>
          <div class="preview-grid" id="preview_${question.id}">
            ${files.length ? files.map(src => `<img src="${src}" alt="Foto anexada" style="width:100%; height:92px; object-fit:cover; border-radius:12px; border:1px solid var(--line);" />`).join('') : `<div class="report-item muted">Nenhuma foto adicionada.</div>`}
          </div>
        </div>`;
      }

      if (question.kind === 'checkboxes_optional') {
        const values = Array.isArray(ans.answer) ? ans.answer : [];
        return `<div class="question" data-question="${question.id}">
          <div class="question-head"><div class="q-num">${index+1}</div><div><div class="legend">${escapeHtml(question.text)}</div><div class="muted" style="font-size:.92rem;">Marque as opções aplicáveis.</div></div></div>
          <div class="choice-group" style="display:block;">
            ${(question.options || []).map(opt => {
              const inputId = `${question.id}_${slugify(opt)}`;
              const checkedClass = values.includes(opt) ? 'checked' : '';
              return `<div class="choice" style="margin-bottom:10px;"><label class="check-flag-row ${checkedClass}" for="${inputId}"><input id="${inputId}" type="checkbox" data-checkbox-group="${question.id}" value="${escapeHtml(opt)}" ${values.includes(opt) ? 'checked' : ''} /><span>${escapeHtml(opt)}</span></label></div>`;
            }).join('')}
          </div>
        </div>`;
      }

      const options = question.kind === 'tri'
        ? ['Sim','Não','Não se aplica']
        : question.kind === 'custom_options'
          ? (question.options || [])
          : ['Sim','Não'];

      const observationTriggers = Array.isArray(question.observationTriggers)
        ? question.observationTriggers
        : [question.observationTrigger || 'Não'];

      const showObs = ['yesno', 'tri', 'custom_options'].includes(question.kind) && observationTriggers.includes(ans.answer);
      const followUps = (question.followUps || []).filter(f => f.trigger === ans.answer);

      return `<div class="question" data-question="${question.id}">
        <div class="question-head"><div class="q-num">${index+1}</div><div><div class="legend">${escapeHtml(question.text)}</div><div class="muted" style="font-size:.92rem;">Selecione a resposta adequada.</div></div></div>
        <div class="choice-group">
          ${options.map(opt => {
            const inputId = `${question.id}_${slugify(opt)}`;
            return `<div class="choice"><input id="${inputId}" type="radio" name="q_${question.id}" value="${escapeHtml(opt)}" ${ans.answer === opt ? 'checked' : ''} /><label for="${inputId}">${escapeHtml(opt)}</label></div>`;
          }).join('')}
        </div>
        <div class="field ${showObs ? '' : 'hidden'}" style="margin-top:14px;">
          <label for="note_${question.id}">${escapeHtml(question.negativeObservation || 'Observação')}</label>
          <textarea id="note_${question.id}" placeholder="Descreva o problema encontrado">${escapeHtml(ans.notes || '')}</textarea>
        </div>
        <div style="margin-top:12px;">
          ${followUps.map(f => `<div class="field" style="margin-top:10px;">
            <label for="extra_${question.id}_${f.key}">${escapeHtml(f.label)}</label>
            ${f.type === 'textarea'
              ? `<textarea id="extra_${question.id}_${f.key}" data-extra="${question.id}|${f.key}" placeholder="Digite aqui">${escapeHtml(ans.extra?.[f.key] || '')}</textarea>`
              : `<input id="extra_${question.id}_${f.key}" data-extra="${question.id}|${f.key}" type="text" value="${escapeHtml(ans.extra?.[f.key] || '')}" placeholder="Digite aqui" />`
            }
          </div>`).join('')}
        </div>
      </div>`;
    }


    function bindQuestionEvents(round) {
      round.questions.filter(shouldShowQuestion).forEach(question => {
        const textInput = screen3.querySelector(`#text_${question.id}`);
        if (textInput) {
          textInput.addEventListener('input', e => {
            e.target.classList.remove('field-error');
            const msg = e.target.parentElement.querySelector('.validation-message');
            if (msg) msg.remove();
            const prev = formState.answers[question.id] || { notes:'', extra:{}, files:[] };
            formState.answers[question.id] = { answer:e.target.value, notes:prev.notes || '', extra:prev.extra || {}, files:prev.files || [] };
          });
        }

        const textareaInput = screen3.querySelector(`#textarea_${question.id}`);
        if (textareaInput) {
          textareaInput.addEventListener('input', e => {
            const prev = formState.answers[question.id] || { notes:'', extra:{}, files:[] };
            formState.answers[question.id] = { answer:e.target.value, notes:prev.notes || '', extra:prev.extra || {}, files:prev.files || [] };
          });
        }

        const photoInput = screen3.querySelector(`#photo_${question.id}`);
        if (photoInput) {
          photoInput.addEventListener('change', e => {
            const files = Array.from(e.target.files || []).slice(0, 6);
            Promise.all(files.map(fileToDataURL)).then(images => {
              const prev = formState.answers[question.id] || { answer:'', notes:'', extra:{}, files:[] };
              formState.answers[question.id] = { answer: images.length ? `${images.length} foto(s) anexada(s)` : '', notes: prev.notes || '', extra: prev.extra || {}, files: images };
              renderScreen3();
            });
          });
        }

        screen3.querySelectorAll(`input[name="q_${question.id}"]`).forEach(input => {
          input.addEventListener('change', e => {
            const prev = formState.answers[question.id] || { notes:'', extra:{}, files:[] };
            formState.answers[question.id] = { answer:e.target.value, notes:prev.notes || '', extra:prev.extra || {}, files:prev.files || [] };
            renderScreen3();
          });
        });

        screen3.querySelectorAll(`input[data-checkbox-group="${question.id}"]`).forEach(input => {
          input.addEventListener('change', () => {
            const prev = formState.answers[question.id] || { notes:'', extra:{}, files:[] };
            const values = [...screen3.querySelectorAll(`input[data-checkbox-group="${question.id}"]:checked`)].map(el => el.value);
            formState.answers[question.id] = { answer:values, notes:prev.notes || '', extra:prev.extra || {}, files:prev.files || [] };
            const row = input.closest('.check-flag-row');
            if (row) row.classList.toggle('checked', input.checked);
          });
        });

        const note = screen3.querySelector(`#note_${question.id}`);
        if (note) {
          note.addEventListener('input', e => {
            e.target.classList.remove('field-error');
            const msg = e.target.parentElement.querySelector('.validation-message');
            if (msg) msg.remove();
            const prev = formState.answers[question.id] || { answer:'', extra:{}, files:[] };
            formState.answers[question.id] = { ...prev, files:prev.files || [], notes:e.target.value };
          });
        }
      });

      screen3.querySelectorAll('[data-extra]').forEach(el => {
        el.addEventListener('input', e => {
          const [qid, key] = e.target.dataset.extra.split('|');
          const prev = formState.answers[qid] || { answer:'', notes:'', extra:{} };
          prev.extra[key] = e.target.value;
          formState.answers[qid] = prev;
        });
      });
    }

    
    function validateRound(round) {
      for (const q of round.questions.filter(shouldShowQuestion)) {
        const st = formState.answers[q.id];
        if (['section', 'section_minor', 'checkboxes_optional', 'textarea_optional', 'photo_upload_optional'].includes(q.kind)) {
          continue;
        }
        if (q.kind === 'text_required' && !st?.answer?.trim()) {
          const textField = screen3.querySelector(`#text_${q.id}`);
          if (textField) {
            textField.classList.add('field-error');
            if (!textField.nextElementSibling || !textField.nextElementSibling.classList || !textField.nextElementSibling.classList.contains('validation-message')) {
              textField.insertAdjacentHTML('afterend', '<div class="validation-message">Preencha este campo antes de finalizar.</div>');
            }
            textField.scrollIntoView({ behavior:'smooth', block:'center' });
            textField.focus();
          }
          alert(`Preencha a pergunta: "${q.text}"`);
          return false;
        }
        if (!['text_required'].includes(q.kind) && !st?.answer) {
          alert(`Responda a pergunta: "${q.text}"`);
          return false;
        }
        const observationTriggers = Array.isArray(q.observationTriggers)
          ? q.observationTriggers
          : [q.observationTrigger || 'Não'];
        if (['yesno', 'tri', 'custom_options'].includes(q.kind) && observationTriggers.includes(st.answer) && !st.notes?.trim()) {
          const obsField = screen3.querySelector(`#note_${q.id}`);
          if (obsField) {
            obsField.classList.add('field-error');
            if (!obsField.nextElementSibling || !obsField.nextElementSibling.classList || !obsField.nextElementSibling.classList.contains('validation-message')) {
              obsField.insertAdjacentHTML('afterend', '<div class="validation-message">Descreva o problema antes de finalizar.</div>');
            }
            obsField.scrollIntoView({ behavior:'smooth', block:'center' });
            obsField.focus();
          }
          alert(`Preencha a observação da pergunta: "${q.text}"`);
          return false;
        }
        if (q.followUps?.length) {
          for (const item of q.followUps.filter(f => f.trigger === st.answer)) {
            const val = st.extra?.[item.key] || '';
            if (!val.trim()) {
              alert(`Preencha o campo adicional: "${item.label}"`);
              return false;
            }
          }
        }
      }
      return true;
    }

          const camposAdicionais = (q.followUps || []).filter(f => f.trigger === st.answer).map(f => ({ campo:f.label, valor:st.extra?.[f.key] || '' }));
          if (q.kind === 'checkboxes_optional') {
            (q.options || []).forEach(opt => {
              const marcado = Array.isArray(st.answer) && st.answer.includes(opt);
              camposAdicionais.push({ campo: opt, valor: marcado ? 'SIM' : 'NÃO' });

          if (q.kind === 'photo_upload_optional') {
            camposAdicionais.push({ campo: 'Fotos anexadas', valor: Array.isArray(st.files) && st.files.length ? `${st.files.length} arquivo(s)` : 'Nenhuma' });
          }
          return {
            ordem: i + 1,
            pergunta: q.text,
            tipo: q.kind,
            resposta: q.kind === 'checkboxes_optional'
              ? ''
              : (Array.isArray(st.answer) ? st.answer.join(', ') : (st.answer || '')),
            observacao: st.notes || '',
            camposAdicionais,
            files: st.files || []
          };
        }) || []
      };
    }

    function setupSignaturePad() {
      const canvas = document.getElementById('signatureCanvas');
      if (!canvas) return;

      const ratio = Math.max(window.devicePixelRatio || 1, 1);
      const rect = canvas.getBoundingClientRect();
      if (!rect.width || !rect.height) return;

      const existing = formState.assinaturaDigital || '';
      canvas.width = Math.floor(rect.width * ratio);
      canvas.height = Math.floor(rect.height * ratio);

      const ctx = canvas.getContext('2d');
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      ctx.lineWidth = 2.2;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = '#081f5c';
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, rect.width, rect.height);

      if (existing) {
        const img = new Image();
        img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
        img.src = existing;
      }

      if (canvas.dataset.bound === '1') return;
      canvas.dataset.bound = '1';

      const getPoint = evt => {
        const r = canvas.getBoundingClientRect();
        const source = evt.touches && evt.touches[0] ? evt.touches[0] : evt;
        return { x: source.clientX - r.left, y: source.clientY - r.top };
      };

      const start = evt => {
        evt.preventDefault();
        isDrawing = true;
        lastPoint = getPoint(evt);
      };

      const move = evt => {
        if (!isDrawing) return;
        evt.preventDefault();
        const point = getPoint(evt);
        const ctx2 = canvas.getContext('2d');
        ctx2.beginPath();
        ctx2.moveTo(lastPoint.x, lastPoint.y);
        ctx2.lineTo(point.x, point.y);
        ctx2.stroke();
        lastPoint = point;
      };

      const end = () => {
        if (!isDrawing) return;
        isDrawing = false;
        lastPoint = null;
        formState.assinaturaDigital = canvas.toDataURL('image/png');
        const pill = screen4.querySelector('.signature-actions .pill');
        if (pill) pill.textContent = 'Assinatura capturada';
      };

      canvas.addEventListener('mousedown', start);
      canvas.addEventListener('mousemove', move);
      canvas.addEventListener('mouseleave', end);
      window.addEventListener('mouseup', end);
      canvas.addEventListener('touchstart', start, { passive:false });
      canvas.addEventListener('touchmove', move, { passive:false });
      canvas.addEventListener('touchend', end, { passive:false });
      canvas.addEventListener('touchcancel', end, { passive:false });
    }


    
    function clearSignature() {
      formState.assinaturaDigital = '';
      const canvas = document.getElementById('signatureCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const rect = canvas.getBoundingClientRect();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      const pill = screen4.querySelector('.signature-actions .pill');
      if (pill) pill.textContent = 'Assinatura pendente';
      setTimeout(setupSignaturePad, 20);
    }


    function handleCertificateFile(e) {
      const file = (e.target.files || [])[0];
      formState.certificadoNome = file ? file.name : '';
      formState.certificadoData = file ? new Date().toISOString() : '';
      const certificadoNome = screen4.querySelector('#certificadoNome');
      if (certificadoNome) certificadoNome.value = formState.certificadoNome || '';
    }

    function makeSmartFileName(ext = 'pdf') {
      const round = getSelectedRound();
      const d = new Date();
      const data = `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
      const nomeRonda = sanitizeFileNamePart((round?.name || 'Ronda').trim());
      const nomeTecnico = sanitizeFileNamePart((formState.tecnico || 'Tecnico').trim());
      return `${nomeRonda} - ${data} - ${nomeTecnico}.${ext}`;
    }

    function buildProfessionalPdf() {
      if (!(window.jspdf && window.jspdf.jsPDF)) {
        alert('A biblioteca de PDF não foi carregada. Verifique sua conexão e tente novamente.');
        return null;
      }

      const report = buildReportObject();
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit:'mm', format:'a4' });
      const pageWidth = doc.internal.pageSize.getWidth();
      const pageHeight = doc.internal.pageSize.getHeight();
      const margin = 12;
      let y = 14;

      const addHeader = () => {
        doc.setFillColor(8,31,92);
        doc.roundedRect(margin, 10, pageWidth - (margin * 2), 24, 5, 5, 'F');
        doc.setTextColor(255,255,255);
        doc.setFont('helvetica','bold');
        doc.setFontSize(16);
        doc.text('Relatório de Ronda Preventiva', margin + 6, 21);
        doc.setFont('helvetica','normal');
        doc.setFontSize(9);
        doc.text('YDUQS • Checklist técnico corporativo', margin + 6, 28);
        y = 42;
        doc.setTextColor(31,41,55);
      };

      const ensureSpace = needed => {
        if (y + needed > pageHeight - 15) {
          doc.addPage();
          addHeader();
        }
      };

      const section = title => {
        ensureSpace(12);
        doc.setFillColor(237,242,247);
        doc.roundedRect(margin, y - 4, pageWidth - (margin * 2), 9, 2, 2, 'F');
        doc.setFont('helvetica','bold');
        doc.setFontSize(11);
        doc.text(title, margin + 4, y + 2);
        y += 13;
      };

      const labelValue = (label, value) => {
        ensureSpace(8);
        doc.setFont('helvetica','bold');
        doc.setFontSize(10);
        const labelWidth = Math.max(34, Math.min(64, doc.getTextWidth(label) + 4));
        doc.text(label, margin, y);
        doc.setFont('helvetica','normal');
        const valueX = margin + labelWidth;
        const lines = doc.splitTextToSize(String(value || '-'), pageWidth - margin - valueX);
        doc.text(lines, valueX, y);
        y += Math.max(6, lines.length * 4.8);
      };

      const card = item => {
        const lines = [];
        if (item.tipo !== 'checkboxes_optional') {
          lines.push(`${['Qual a sala de reunião?', 'Andar', 'Tempo total de ronda (min)', 'Observações', 'Riscos/Planos de ação'].includes(item.pergunta) ? 'Informação' : 'Resposta'}: ${item.resposta || '-'}`);
        }
        if (item.observacao) lines.push(`Observação: ${item.observacao}`);
        (item.camposAdicionais || []).forEach(extra => lines.push(`${extra.campo}: ${extra.valor || '-'}`));
        const titleLines = doc.splitTextToSize(`${item.pergunta}`, pageWidth - (margin * 2) - 8);
        const bodyLines = lines.flatMap(line => doc.splitTextToSize(line, pageWidth - (margin * 2) - 8));
        const h = 10 + titleLines.length * 5 + bodyLines.length * 4.7 + 6;
        ensureSpace(h);
        doc.setDrawColor(220,229,240);
        doc.setFillColor(252,253,255);
        doc.roundedRect(margin, y - 4, pageWidth - (margin * 2), h, 3, 3, 'FD');
        doc.setFont('helvetica','bold');
        doc.setFontSize(10);
        doc.text(titleLines, margin + 4, y + 2);
        let innerY = y + 2 + titleLines.length * 5;
        doc.setFont('helvetica','normal');
        doc.setFontSize(9.2);
        bodyLines.forEach(line => {
          doc.text(line, margin + 4, innerY);
          innerY += 4.7;
        });
        y += h + 4;
      };

      addHeader();
      section('Identificação');
      labelValue('Técnico:', report.tecnico);
      labelValue('Unidade:', report.unidade);
      labelValue('Dispositivo:', formState.deviceMode);
      labelValue('Ronda:', report.ronda);
      labelValue('Validação do Checklist:', report.validacaoChecklist || '-');
      if (report.ronda === 'Ronda nas Salas de Reunião') {
        const sala = report.perguntas.find(p => p.pergunta === 'Qual a sala de reunião?')?.resposta || '-';
        labelValue('Sala de reunião:', sala);
      }
      if (report.ronda === 'CPD' || report.ronda === 'Ronda Setorial') {
        const andar = report.perguntas.find(p => p.pergunta === 'Andar')?.resposta || '-';
        const tempoRonda = report.perguntas.find(p => p.pergunta === 'Tempo total de ronda (min)')?.resposta || '-';
        labelValue('Andar:', andar);
        labelValue('Tempo de ronda:', `${tempoRonda} min`);
      }
      labelValue('Gerado em:', new Date(report.geradoEm).toLocaleString('pt-BR'));
      labelValue('Certificado digital:', report.certificadoNome || '-');

      section('Checklist respondido');
      report.perguntas.forEach(card);

      if (formState.fotos && formState.fotos.length) {
        section('Evidências fotográficas');
        formState.fotos.forEach(img => {
          try {
            ensureSpace(45);
            doc.addImage(img, 'JPEG', margin, y, 80, 45);
            y += 50;
          } catch(e) {
            try {
              doc.addImage(img, 'PNG', margin, y, 80, 45);
              y += 50;
            } catch(err) {}
          }
        });
      }

      section('Validação do Checklist');
      ensureSpace(42);
      doc.setDrawColor(180, 190, 205);
      doc.line(margin + 8, y + 24, pageWidth - margin - 8, y + 24);
      doc.setFont('helvetica','bold');
      doc.setFontSize(10);
      doc.text('Validação do Checklist', margin + 8, y + 30);
      doc.setFont('helvetica','normal');
      doc.setFontSize(9);
      doc.text(`Técnico: ${report.tecnico || '-'}`, margin + 8, y + 35);

      if (report.assinaturaDigital) {
        try {
          doc.addImage(report.assinaturaDigital, 'PNG', margin + 12, y + 2, 70, 18, undefined, 'FAST');
        } catch (e) {}
      }

      const totalPages = doc.getNumberOfPages();
      for (let i = 1; i <= totalPages; i++) {
        doc.setPage(i);
        doc.setTextColor(100,116,139);
        doc.setFontSize(8.2);
        doc.text(`Página ${i} de ${totalPages}`, pageWidth - 28, pageHeight - 8);
      }
      return doc;
    }

    function getExportRows() {
      const report = buildReportObject();
      return report.perguntas.map(item => ({
        Técnico: report.tecnico,
        Unidade: report.unidade,
        Ronda: report.ronda,
        'Validação do Checklist': report.validacaoChecklist || '',
        'Data/Hora': new Date(report.geradoEm).toLocaleString('pt-BR'),
        Pergunta: item.pergunta,
        Resposta: item.resposta || '',
        Observação: item.observacao || '',
        'Campos adicionais': (item.camposAdicionais || []).map(extra => `${extra.campo}: ${extra.valor || ''}`).join(' | '),
        'Certificado digital': report.certificadoNome || ''
      }));
    }

    function sanitizeFileNamePart(value) {
      return String(value || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[\\/:*?"<>|]/g, '')
        .replace(/\s+/g, ' ')
        .trim() || 'Arquivo';
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 15000);
    }

    function generateExcelDownload() {
      if (!(window.XLSX && window.XLSX.utils)) {
        alert('A biblioteca de Excel não foi carregada. Verifique sua conexão e tente novamente.');
        return;
      }
      const rows = getExportRows();
      const worksheet = XLSX.utils.json_to_sheet(rows);
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, 'Ronda');
      XLSX.writeFile(workbook, makeSmartFileName('xlsx'));
    }

    function escapeCsvValue(value) {
      const text = String(value ?? '');
      if (/[;"\n\r]/.test(text)) return `"${text.replace(/"/g, '""')}"`;
      return text;
    }

    function generateCsvDownload() {
      const rows = getExportRows();
      if (!rows.length) {
        alert('Não há dados para exportar.');
        return;
      }
      const headers = Object.keys(rows[0]);
      const lines = [
        headers.map(escapeCsvValue).join(';'),
        ...rows.map(row => headers.map(header => escapeCsvValue(row[header])).join(';'))
      ];
      const blob = new Blob(['\uFEFF' + lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
      downloadBlob(blob, makeSmartFileName('csv'));
    }

    async function saveReportToChosenFolder() {
      try {
        const doc = buildProfessionalPdf();
        if (!doc) return;
        const filename = makeSmartFileName('pdf');
        const pdfBlob = doc.output('blob');
        const canPickLocation = window.isSecureContext && 'showSaveFilePicker' in window && typeof window.showSaveFilePicker === 'function';

        if (canPickLocation) {
          try {
            const handle = await window.showSaveFilePicker({
              suggestedName: filename,
              types: [{ description:'Arquivo PDF', accept: { 'application/pdf':['.pdf'] } }]
            });
            const writable = await handle.createWritable();
            await writable.write(pdfBlob);
            await writable.close();
            alert('Relatório salvo com sucesso.');
            return;
          } catch (error) {
            if (error && error.name === 'AbortError') return;
          }
        }

        downloadBlob(pdfBlob, filename);
      } catch (error) {
        console.error('Falha ao salvar PDF:', error);
        alert('Não foi possível salvar o PDF.');
      }
    }

    function generatePdfDownload() {
      const doc = buildProfessionalPdf();
      if (!doc) return;
      doc.save(makeSmartFileName('pdf'));
    }

    function newChecklist() {
      formState.roundId = '';
      formState.answers = {};
      formState.assinaturaDigital = '';
      formState.certificadoNome = '';
      formState.certificadoData = '';
      showStep(2);
      renderScreen2();
      renderScreen3();
      renderScreen4();
    }

    function resetAll() {
      if (!confirm('Deseja apagar todo o processo e voltar para a aba Identificação?')) return;
      formState.tecnico = '';
      formState.unidade = '';
      formState.assinatura = '';
      formState.fotos = [];
      formState.roundId = '';
      formState.answers = {};
      formState.startedAt = '';
      formState.assinaturaDigital = '';
      formState.certificadoNome = '';
      formState.certificadoData = '';
      detectDevice();
      renderScreen1();
      renderScreen2();
      renderScreen3();
      renderScreen4();
      showStep(1);
    }

    function slugify(text) {
      return (text || '').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]+/g,'_').replace(/^_|_$/g,'').toLowerCase();
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }
  </script>
</body>
